[technology-description]
nuclear-fuel-reprocessing=Процесс переработки использованного ядерного топлива для получения ценных изотопов.
thorium-nuclear-fuel-reprocessing=Изучение процессов переработки использованного ториевого ядерного топлива и извлечения ценных изотопов.
mixed-oxide-fuel=Использование плутония в качестве источника частиц позволит повысить эффективность использования ядерного топлива.
thermonuclear-bomb="Если сияние тысячи солнц вспыхнуло бы в небе, это было бы подобно блеску Всемогущего… Я стану смертью, Разрушителем Миров." (древние письмена)
radiothermal-fuel=Чрезвычайно долговечные источники тепла, синтезированные из высокорадиоактивных элементов.
thorium-ore-processing=Ториевая руда содержит большое количество примесей и должна быть очищена перед дальнейшим использованием.

