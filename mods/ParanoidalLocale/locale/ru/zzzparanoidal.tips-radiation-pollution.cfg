[tips-and-tricks-description]
radiation-help=\n[color=255,230,0][font=default-bold]Что такое радиация[/font][/color]\nРадиоактивные предметы и сущности облучают тебя — урон тем больше, чем больше материала и чем ты ближе.\n\n[font=default-bold]Два источника[/font]\n• [font=default-bold]Точечные[/font]: руда, предметы на земле и лентах, в манипуляторах, станках, трубах, трупы битеров. Затухают по расстоянию и [font=default-bold]блокируются радиа-стенами[/font] по линии видимости.\n• [font=default-bold]Чанковые[/font]: радиоактивное в [font=default-bold]сундуках[/font]. Считаются по чанку, бьют [font=default-bold]сквозь стены[/font], достают до 8 чанков (256 тайлов), на источнике [font=default-bold]без затухания[/font].\n\n[font=default-bold]Урон за тик[/font]\nΣ(кол-во × значение) → ×Базовая радиация → ÷15 → ×Множитель урона → −броня.\n[color=255,80,80]Потолка нет[/color] — вдвое больше урана даёт вдвое больше урона.\n\n[font=default-bold]Значения предметов[/font]\n[img=item/uranium-ore] руда = 1    [img=item/uranium-238] = 2    [img=item/uranium-235] = 5\n[img=item/uranium-fuel-cell] ТВЭЛ = 10    [img=item/nuclear-fuel] топливо = 10\n\nЦентр карты безопасен (зона защиты вокруг точки 0,0).
radiation-protect=\n[font=default-bold]Как защититься от радиации[/font]\n• [img=item/radiation-absorption-equipment] поглощение и [img=item/radiation-reduction-equipment] снижение — [color=255,80,80]только в гриде брони![/color] Лежащие в инвентаре НЕ работают.\n• [img=item/stkz-radiation-wall] Радиа-стена: каждая стена на линии до источника снижает урон на 200. Помогает против точечных источников; [color=255,80,80]сундуки в чанковом режиме не экранирует[/color].\n• [font=default-bold]Дистанция[/font]: точечные затухают по расстоянию; чанковые достают до 8 чанков — отойди дальше.\n• [font=default-bold]Малые буферы[/font]: не сваливай уран в один сундук, урон линеен от количества.\n• [font=default-bold]Не носи радиоактивное в инвентаре[/font] — там оно бьёт без затухания.\n• Расходуй уран в реакторах, а не копи стопками.
radiation-settings=\n[font=default-bold]Настройки мода[/font] — Настройки → Настройки модов (вкладки Запуск / Карта / Игрок). Значения по умолчанию в скобках:
radiation-sos=\n[color=255,80,80][font=default-bold]Тебя жжёт радиацией — что делать[/font][/color]\n1. [font=default-bold]Отойди[/font] от складов урана и руды — для чанковой радиации нужно ≥8 чанков (256 тайлов).\n2. [font=default-bold]Выкини радиоактивное из инвентаря[/font] (уран, ТВЭЛы) — оно бьёт без затухания.\n3. [font=default-bold]Вставь защиту в грид брони[/font] (поглощение/снижение) — в инвентаре она бесполезна.\n4. [font=default-bold]Сундук с ураном фонит сквозь стены?[/font] Разгрузи его или временно выключи чанковую радиацию в настройках мода (Настройки модов → Карта, без перезапуска).\n5. [font=default-bold]Беги к центру карты[/font] — внутри зоны защиты радиации нет.\n6. Помни: стены спасают от точечных источников, но не от чанковых складов.
pollution-help=\n[color=180,200,80][font=default-bold]Что такое токсичное загрязнение[/font][/color]\nСтоя в облаке загрязнения, ты получаешь урон. Он зависит от трёх вещей:\n• [font=default-bold]Уровень загрязнения[/font] в точке, где стоишь.\n• [font=default-bold]Броня[/font] — резист [font=default-bold]toxin[/font] и техи поглощения.\n• [font=default-bold]Множитель времени[/font] — чем дольше стоишь, тем сильнее урон.\n\n[font=default-bold]Множитель[/font] растёт от 0 до [font=default-bold]×60 за 5 минут[/font] в облаке; урон = базовый × множитель. Вышел — спадает. Поэтому «минуту терпимо, пять — внезапно убивает».\n\n[font=default-bold]Порог[/font]: урон идёт, только если загрязнение выше порога (по умолч. 20) плюс поглощение брони.\n\n[font=default-bold]Броня тратит прочность, не HP[/font]: пока носишь броню с резистом, урон уходит в износ брони. Без брони — прямой урон по HP, вплоть до смерти.\n\n[font=default-bold]Предупреждения на экране[/font]\n[img=virtual-signal/signal-yellow-gas-mask] высокое загрязнение (урон ≤ 20)\n[img=virtual-signal/signal-red-gas-mask] очень высокое (урон > 20)\n[img=virtual-signal/signal-red-armor] броня изношена (< 25%)\n[img=virtual-signal/signal-yellow-more-toxin] накоплены токсины (остаточный урон после выхода)\n\n[font=default-bold]Пример:[/font] [img=virtual-signal/signal-red-gas-mask] Очень высокое загрязнение! · Уровень: 480 · Урон: 32 · Множитель: 41
pollution-protect=\n[font=default-bold]Как защититься от загрязнения[/font]\n• [img=item/respirator] [font=default-bold]Респиратор / противогаз / броня с резистом toxin[/font] — носи в слоте брони. Урон идёт в износ, а не в HP.\n• [font=default-bold]Техи поглощения[/font] (armor-absorb-1…N) — каждая повышает поглощение брони.\n• [font=default-bold]Авто-смена брони[/font]: при износе текущей надевается следующая из инвентаря — держи запас.\n• [font=default-bold]Снижай загрязнение[/font]: меньше дыма, деревья, фильтрация воздуха.\n• [font=default-bold]Уходи из облака[/font] — множитель и урон спадают.\n• Не стой подолгу в загрязнении — множитель копится.
pollution-settings=\n[font=default-bold]Настройки мода[/font] (startup-настройки требуют нового мира). Значения по умолчанию в скобках:
pollution-sos=\n[color=255,80,80][font=default-bold]Тебя убивает загрязнением — что делать[/font][/color]\n1. [font=default-bold]Немедленно выйди из облака[/font] — урон и множитель сразу начнут спадать.\n2. [img=item/respirator] [font=default-bold]Надень броню или респиратор[/font] с резистом toxin — урон уйдёт в износ брони, а не в HP.\n3. [font=default-bold]Нет брони?[/font] Беги к чистому воздуху; без брони урон идёт прямо по HP.\n4. [font=default-bold]Держи запас брони[/font] в инвентаре и включи авто-надевание.\n5. [font=default-bold]Исследуй[/font] armor-absorb, чтобы броня поглощала больше.\n6. Снижай загрязнение у базы: фильтры, деревья, меньше дыма.

[zzz-rad-set]
chunk-range=излучение складов в сундуках сквозь стены (по умолч. вкл). Выключи — стены снова прикроют сундуки.
chunk-radius=дальность чанковой радиации в чанках (деф. 8; 4–48).
rad-radius=радиус точечных источников в тайлах (деф. 12; 8–20).
protect-radius=безопасная зона вокруг центра карты (деф. 50; 0–125).
base=общий множитель всей радиации до брони (деф. 1.0).
mult=итоговый множитель урона (деф. 1.0).
biters=битеры и их трупы фонят (деф. вкл).
perf=сколько чанков пересчитывается за цикл; влияет на производительность, не на урон (деф. 6).
gui=индикатор радиации на экране при уроне (деф. вкл, на игрока).
menu=анимации радиации в главном меню; косметика (деф. вкл, startup).

[zzz-pol-set]
absorb-mult=насколько резист брони поглощает загрязнение; выше = броня держит больше (деф. 100; startup).
threshold=загрязнение ниже этого порога (плюс поглощение брони) не наносит урона (деф. 20; startup).
auto-equip=при износе текущей брони автоматически надеть следующую из инвентаря (деф. вкл, на игрока).
respawn=выдавать респиратор после возрождения (деф. выкл, на игрока).

