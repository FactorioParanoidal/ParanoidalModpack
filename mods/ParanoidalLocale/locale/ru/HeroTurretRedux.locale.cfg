[mod-setting-description]
heroturrets-setting-level-up-modifier=Изменяет модификатор убийства для ранга
heroturrets-setting-level-buff-modifier=Изменяет баффы, применяемые к рангу
heroturrets-kill-counter=Точно приведёт к тому, что в инвентаре будет много стеков с тегами, из-за того, что каждый стек перекодирует разное количество убийств
heroturrets-allow-artillery-turrets=Если отключено, все ранжированные артиллерийские башни необходимо будет поднять и опустить обратно
heroturrets-setting-ammo-turret-kill-multiplier=Умножает количество убийств на ранг за уровень, применяемый после модификатора убийств
heroturrets-setting-fluid-turret-kill-multiplier=Умножает количество убийств на ранг за уровень, применяемый после модификатора убийств
heroturrets-setting-electric-turret-kill-multiplier=Умножает количество убийств на ранг за уровень, применяемый после модификатора убийств
heroturrets-setting-artillery-turret-kill-multiplier=Умножает количество убийств на ранг за уровень, применяемый после модификатора убийств
heroturrets-allow-damage=Позволяет ранжировать по нанесённому урону
heroturrets-use-csv=Включает или отключает пользовательские имена
heroturrets-csv-names=Позволяют определять имена рангов, они должны быть разделены запятой. Они распределят баффы по доступным опциям. Рекомендуется устанавливать перед игрой. Максимум 12 имён. Максимальная длина имени 25 символов, 4 минимальная.
heroturrets-damage-counter=Retain damage stats, only works if Kill Counter is set to Exact

