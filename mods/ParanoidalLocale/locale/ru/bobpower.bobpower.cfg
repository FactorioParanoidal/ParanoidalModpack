[technology-description]
bob-electric-pole=Исследование улучшенных линий электропередач.
bob-electric-substation=Исследование лучших подстанций.
bob-boiler=Исследование продвинутых нагревательных бойлеров, способных разогревать пар до более высоких температур.
bob-steam-engine=Исследование способов повышения эффективности паровых генераторов.
bob-oil-boiler=Исследование продвинутых жидкотопливных котлов, способных разогревать пар до более высоких температур.
bob-heat-exchanger=Исследование продвинутых теплообменников.
bob-steam-turbine=Исследование способов повышения эффективности паровых энергогенерирующих турбин.
bob-heat-pipe=Открывает тепловые трубы, для передачи тепловой энергии до потребителя.
bob-burner-reactor=Исследование тепловой энергии. Источник тепла сжигающий топливо. Подсоединяется к потребителю энергии через тепловую трубу.
bob-fluid-reactor=Исследование тепловой энергии. Источник тепла сжигающий жидкое топливо. Подсоединяется к потребителю энергии через тепловую трубу.

