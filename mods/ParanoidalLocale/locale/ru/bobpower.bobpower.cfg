[entity-description]
bob-burner-reactor=Модифицированная стальная печь, топливный источник тепла. Подсоединяется к потребителю энергии через тепловую трубу.\nМаксимальная температура __1__°C.
bob-fluid-reactor=Модифицированная стальная печь, жидкотопливный источник тепла. Подсоединяется к потребителю энергии через тепловую трубу.\nМакс. температура __1__°C.
bob-heat-pipe=Тепловая труба может передавать тепло на большие расстояния и подключать устройства, которые вырабатывают и используют тепло.\nМаксимальная температура __1__°C.
bob-oil-boiler=Сжигает жидкое топливо, превращая воду в пар.

