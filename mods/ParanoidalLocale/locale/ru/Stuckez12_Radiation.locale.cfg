[mod-setting-description]
Stuckez12-Radiation-Radiation-Radius=Дистанция в тайлах, на которой действует радиация.
Stuckez12-Radiation-Protection-Radius=Зона защиты в центре каждой поверхности, где радиация не действует.
Stuckez12-Radiation-Enable-GUI-Effect=Показывать ли логотип радиации в центре экрана при получении урона.
Stuckez12-Radiation-Enable-Biter-Radiation=Излучают ли радиацию битеры и их трупы.
Stuckez12-Radiation-Enable-Chunk-Range-Radiation=Могут ли контейнеры излучать радиацию по дистанции в чанках, а не в тайлах.
Stuckez12-Radiation-Chunk-Effect-Radius=Максимальная дальность радиоактивного контейнера по дистанции в чанках. Требует включённой чанковой радиации.
Stuckez12-Radiation-Menu-Simulations=Включать ли симуляции радиации в главном меню.
Stuckez12-Radiation-Chunks-Per-Call=Сколько чанков обрабатывается за цикл (каждые 4 кадра). Меньшее значение — выше производительность.
Stuckez12-Radiation-Base-Radiation=Множитель начального урона радиации (до звукового оповещения).
Stuckez12-Radiation-Damage-Multiplier=Множитель урона радиации после звукового оповещения.

