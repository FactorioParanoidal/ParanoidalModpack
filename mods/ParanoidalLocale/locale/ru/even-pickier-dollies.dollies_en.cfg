[controls]
dolly-move-north=Переместить объект выше
dolly-move-west=Переместить объект west
dolly-move-south=Переместить объект south
dolly-move-east=Переместить объект east
dolly-rotate-rectangle=Повернуть продолговатый комбинатор
dolly-rotate-rectangle-reverse=Обратное вращение прямоугольного комбинатора
dolly-rotate-saved=Повернуть сохранённый объект
dolly-rotate-saved-reverse=Обратный поворот сохраненного объекта

[mod-setting-name]
dolly-save-entity=Сохранить последний перемещенный объект
dolly-clear-entity=Очистить последний перемещенный объект при выборе другого объекта
dolly-ignore-collisions=Игнорировать границы объектов
dolly-allow-ignore-collisions=Игнорировать пересечения границ объектов
dolly-debug=Включить отладку
dolly-transporter-mode=Режим  "Транспортёр"

[mod-setting-description]
dolly-save-entity=Временно сохраняет объекты на X секунд, чтобы их можно было перемещать без необходимости выбирать их заново. Установите 0, чтобы отключить сохранение.
dolly-clear-entity=Очищайте сохраненный объект сразу после выбора другого объекта.
dolly-ignore-collisions=Разрешить перемещаемым объектам наслаиваться на уже имеющиеся. Запрещено по умолчанию глобальными настройками. Баговано и читерно.
dolly-allow-ignore-collisions=Разрешить игрокам использовать параметр "Игнорировать пересечения границ объектов".
dolly-debug=Включить информацию для отладки при перемещении объектов. Если вы столкнулись с проблемами в этом моде, сначала активируйте эту настройку.
dolly-transporter-mode=Перемещает сущности, которые обычно невозможно переместить, создавая идентичную копию и уничтожая оригинал (именно так на самом деле работает транспортер в "Звездный путь").

[picker-dollies]
cant-be-teleported=__1__ не поддерживает перемещение.
wires-maxed=Провода нельзя растянуть дальше.
no-room=__1__ не влезает.
wrong-force=__1__ не поддаётся.
rocket-present=__1__ не может быть перемещён, пока ракета на месте. Сначала запустите ракету.
teleport-problem=ПРОБЛЕМА С PICKIER DOLLIES! ПОЖАЛУЙСТА, СООБЩИТЕ АВТОРУ МОДА. НЕ УДАЛОСЬ ВОССТАНОВИТЬ ПОЛОЖЕНИЕ __1__

