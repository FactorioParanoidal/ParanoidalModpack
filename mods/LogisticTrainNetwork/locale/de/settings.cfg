[mod-setting-description]
ltn-interface-console-level=Nachrichten Detailgrad.\n\n0: Aus\nKeine Nachrichten werden generiert.\n\n1: Fehler & Warnungen\nNur Fehler & Warnungen werden generiert.\n\n2: Informationen (Standardwert)\nInformiert über grundlegende Informationen wie fehlende Ressourcen und erstellte Lieferungen.\n\n3: Ausführliche Nachrichten\nErweiterte Informationen über Stations- und Zug-Suche.
ltn-interface-factorio-alerts=Fehler & Warnungen werden als Factorio Alarme angezeigt.
ltn-interface-debug-logfile=Schreibt Debug Informationen in /Factorio/factorio-current.log.

ltn-dispatcher-enabled=Warnung: Durch deaktivieren des Disponenten werden keine Lieferung generiert.\nVerfügbare Gegenstände werden weiterhin überwacht.
ltn-dispatcher-nth_tick=Häufigkeit der Stations- und Anforderungsaktualisierungen.\nHöhere Werte verbessern Performance.\nErzwingt Updates pro Tick = 1 bei Werten über 1.
ltn-dispatcher-updates-per-tick=Anzahl der Stations- und Anforderungsaktualisierungen pro Tick.\nNiedrigere Werte verbessern Leistung.\nWird ignoriert wenn Update Frequenz > 1.
ltn-dispatcher-requester-threshold=Mindestmenge an Artikeln um eine Lieferung auszulösen. \nKann durch Signal pro Anforderer-Haltestelle überschrieben werden.\nStandardwert = 1000
ltn-dispatcher-provider-threshold=Mindestmenge an Artikeln um als Anbieter erkannt zu werden. \nKann durch Signal pro Anbieter-Haltestelle überschrieben werden.\nStandardwert = 1000
ltn-dispatcher-schedule-circuit-control=Aktiviert Schaltungsbedinungen rot = 0 ODER grün ≥ 1 for alle Haltestellen.\nAchtung: Alle LTN Haltestellen müssen "an Zug senden" aktiviert und eine Schaltnetz-Verbindung haben. Sonst warten Züge ewig auf ein Signal.\nStandardwert = false
ltn-dispatcher-depot-inactivity=Dauer in Sekunden, bevor Züge das Depot wegen Inaktivität verlassen.\nStandardwert = 5
ltn-dispatcher-stop-timeout=Dauer in Sekunden bevor Züge ihre Station verlassen müssen.\n0 schaltet diese Funktion aus.\nStandardwert = 120s
ltn-dispatcher-delivery-timeout=Lieferzeit in Sekunden bevor Züge als vermisst gelten.\nStandardwert = 600s (10min)
ltn-dispatcher-requester-delivery-reset=Inaktiv (Standardwert):\nLieferung und Fahrplan werden bei Ankunft im Depot zurück gesetzt.\nÄnderungen an Zügen in Anforderer-Haltestellen haben keine Auswirkung.\n\nAktiv:\nLieferung und Fahrplan werden bei verlassen der Anforderer-Haltestelle zurück gesetzt.\nÄnderungen an Zügen in Anforderer-Haltestellen löscht die Lieferung und setzt den Fahrplan zurück.
ltn-dispatcher-finish-loading=Aktiv (Standardwert):\nVerhindert verlassen von Haltestellen während Greifarme/Pumpen arbeiten.\n\nInaktiv:\nZüge verlassen Haltestellen unmittelbar nach erreichen ihrer gewünschten Beladung.\nGreifarme bleiben Gegenstände haltend stecken, Tankwaggons enthalten Restmengen.
ltn-depot-reset-filters=Aktiv (Standardwert):\nFilter und Stapelbegrenzungen in Güterwaggons werden bei Ankunft im Depot gelöscht.
ltn-depot-fluid-cleaning=Maximale Flüssigkeitsmenge pro Waggon die bei Ankunft im Depot automatisch zerstört wird.\n0 schaltet diese Funktion aus, -1 entfernt alle Flüssigkeiten.
ltn-stop-default-network=Netzwerk ID wenn kein Signal "Kodierte Netzwerk ID" existiert.
ltn-provider-show-existing-cargo=Aktiv (Standardwert):\nExistierende Ladung von Zügen bei Ankunft am Anbieter wird im Haltestellen Signalausgang gezeigt.\nBeinhaltet Gegenstände die Greifarme auf die Gleise halten.
ltn-provider-ignore-stopped-train=Aktiv (Standardwert):\nAn der Station haltende Züge werden ignoriert wenn eine neue Lieferung generiert wird.
ltn-schedule-fuel-station=Aktiviere Tankstops um Züge zu betanken.\nWenn eine Tankstelle im Netzwerk ist, dann werden Züge zum Betanken geschickt.
ltn-schedule-reset-interrupts=Entferne alle Fahrplanunterbrechungen wenn ein Zug ein Depot erreicht.
ltn-schedule-reselect-depot=(Diese Einstellung hat nur einen Effekt wenn "Fahrplan bei Anforderer abschließen" aktiv ist.) Wenn der Zug zu einem Depot zurückkehren soll, wird das Depot neu ausgewählt.
ltn-fuel-station-interrupt=Wenn aktiviert, dann wird eine Factorio Fahrplanunterbrechung verwendet um Züge zum betanken zu schicken. Dies ist der Normalbetrieb und sollte nur deaktiviert werden wenn Probleme auftreten.\nWenn die Funktion deaktiviert wird, dann ändert LTN den Fahrplan automatisch und schickt Züge zum betanken.
ltn-advanced-cross-surface-delivery=Wenn aktiviert, dann wählt LTN Züge von anderen Oberflächen aus, um Lieferungen durchzuführen.
ltn-depot-fudge-factor=Maximaler Streckenlängenunterschied bei dem die Entfernung zwischen Depot und Anbieter als gleich behandelt wird.
ltn-depot-stop-limit-trains=[font=default-semibold][color=red][EXPERIMENTELL!][/color][/font] Legt die Zugbeschränkungen für LTN Haltestellen fest.

