[mod-setting-name]
OT_realism=Realism factor
OT_factorio-weights=Use native weights
OT_debug-mode=Debug mode

[mod-setting-description]
OT_realism=Set a multiplier, how much your trains will be slowed down by the weight of loaded goods.\nRealistic: 1.0 (yes, seriously)
OT_factorio-weights=This makes the trains use the weights of the rocket system (times 10)
OT_debug-mode=Prints item weight info to the host when a train starts moving