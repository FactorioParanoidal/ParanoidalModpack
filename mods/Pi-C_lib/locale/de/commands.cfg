[PiClib-commands]
# Debugging commands
command-show-active-events-help=[color=yellow]Verwendung: /__1__\nSchreibt die Namen aller aktiven Ereignisse in den Chat und in die Logdatei.[/color]
command-is-event-active-help=[color=yellow]Verwendung: /__1__ [Name, ID]\nIst das angegebene Ereignis aktiv? Das Ereignis kann entweder als Zeichenkette ohne Anführungszeichen (Name) oder als ganze Zahl (ID) angegeben werden.[/color]


[PiClib-command-output]
show-active-events=__1__ reagiert momentan auf folgende Ereignisse: __2__
show-active-events-no-events=__1__ reagiert momentan NICHT auf Ereignisse ("events")!
is-event-active-true=__1__ reagiert momentan auf das Ereignis "__2__" (__3__).
is-event-active-false=__1__ reagiert momentan NICHT auf das Ereignis "__2__" (__3__).

[PiClib-command-errors]
error=[color=yellow][ERROR] __1__[/color]
is-event-active-invalid-event=Es gibt kein Ereignis "__1__"!
is-event-active-no-args=Du musst ein Ereignis angeben (Ganze Zahl or Name ohne Anführungszeichen)!
