[PiClib-commands]
# Debugging commands
command-show-active-events-help=[color=yellow]Usage: /__1__\nPrint and log list of events the mod is listening to[/color]
command-is-event-active-help=[color=yellow]Usage: /__1__ [number or event name]\nCheck whether the mod is listening to the specified event[/color]

[PiClib-command-output]
show-active-events=__1__ is currently listening to these events: __2__
show-active-events-no-events=__1__ is currently NOT listening to any events!
is-event-active-true=__1__ is currently listening to event "__2__" (__3__).
is-event-active-false=__1__ is currently NOT listening to event "__2__" (__3__).

[PiClib-command-errors]
error=[color=yellow][ERROR] __1__[/color]
is-event-active-invalid-event=Event "__1__" doesn't exist!
is-event-active-no-args=You must specify an event (integer or string)!
