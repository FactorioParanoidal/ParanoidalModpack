[mod-setting-description]
picker-planner-height=Affects the maximum height of the picker planner menu before scroll bar is added. This value is in pixels. Original default was 110px, allowing roughly two rows of buttons.
picker-planner-width=Affects the weidth of the picker planner menu. This value is in number of columns (64px each). Original default was 6 columns. If the value is increased beyond the screen size, a bottom scroll bar is added.
picker-planner-sorter=Enables sorting of additional blueprint and deconstruction planners added by other mods.
picker-auto-sort-inventory=Enables automatic sorting of container inventories. Disable when playing with particularly large containers.
picker-auto-circuit-bots=Bots automatically connect circuit wires.
picker-item-count=Enable or disable displaying the total item count of held item.
picker-use-bar-limit=Enables the chest limit feature.
picker-copy-between-surfaces=Copy and paste chests between surfaces. Quite cheaty with Space Age. When disabled, source and destination chests must be on the same surface as the player.
picker-allow-multiple-craft=Craft Pippete can also craft items in inventory.
picker-player-paste-modifier=Additional paste modifier takes recipes paste modifier and multiplies it by this amount.
picker-search-light=Player flashlight aims toward whatever the player selects.
picker-alt-mode-default=Enables alt-mode on first load and multiplayer join.
picker-camera-zoom=Zoom at which the scene is rendered.
picker-camera-aa=Anti-alias the picture.
picker-camera-gui=GUI elements appear in screenshots. Note: GUI elements will not appear in the same locations in the sreenshot as they do in-game.
picker-remember-planner=Remember last planner when cycling planners.
picker-tool-tape-measure=Enable tape measure tool.
picker-tool-ore-eraser=Enable ore eraser tool.
picker-tool-camera=Enable screenshot camera tool.
picker-chat-color=Default chat color to use for this player on first load and multiplayer join.
picker-character-color=Default character color to use for this player on first load and multiplayer join.
picker-revive-selected-ghosts-entity=Revive selected ghosts if you have the matching item in your hand.
picker-revive-selected-ghosts-upgrade=Revive selected ghost upgrades if you have the matching item in your hand.
picker-revive-selected-ghosts-tile=Revive selected tiles if you have the matching item in your hand.
picker-revive-ignore-quality=Ignores quality of ghost entities, tiles, and upgrades when placing. NOTE: This only destroys quality when placing tiles.
picker-zapper=Enable the planner zapper functionality (destroys planners when dropped)
picker-tape-measure-clamp=Number of significant digits to clamp the measurements provided by the Tape Measure Tool. Defaults to 4 digits, 10 = Unlimited

