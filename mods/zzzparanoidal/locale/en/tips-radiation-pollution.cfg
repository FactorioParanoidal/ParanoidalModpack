[tips-and-tricks-description]
radiation-help=\n[color=255,230,0][font=default-bold]What radiation is[/font][/color]\nRadioactive items and entities irradiate you — the more material and the closer you are, the higher the damage.\n\n[font=default-bold]Two sources[/font]\n• [font=default-bold]Point sources[/font]: ore, items on the ground and belts, in inserters, machines, pipes, biter corpses. Fall off with distance and are [font=default-bold]blocked by radiation walls[/font] along line of sight.\n• [font=default-bold]Chunk sources[/font]: radioactive items in [font=default-bold]chests[/font]. Counted per chunk, hit [font=default-bold]through walls[/font], reach up to 8 chunks (256 tiles), with [font=default-bold]no falloff[/font] at the source.\n\n[font=default-bold]Damage per tick[/font]\nΣ(count × value) → ×Base Radiation → ÷15 → ×Damage Multiplier → −armor.\n[color=255,80,80]No cap[/color] — twice the uranium means twice the damage.\n\n[font=default-bold]Item values[/font]\n[img=item/uranium-ore] ore = 1    [img=item/uranium-238] = 2    [img=item/uranium-235] = 5\n[img=item/uranium-fuel-cell] fuel cell = 10    [img=item/nuclear-fuel] = 10\n\nThe map center is safe (protection zone around 0,0).
radiation-protect=\n[font=default-bold]How to protect against radiation[/font]\n• [img=item/radiation-absorption-equipment] absorption and [img=item/radiation-reduction-equipment] reduction — [color=255,80,80]only inside the armor grid![/color] Sitting in your inventory they do NOTHING.\n• [img=item/stkz-radiation-wall] Radiation wall: each wall on the line to a source cuts damage by 200. Works against point sources; [color=255,80,80]does not shield chests in chunk mode[/color].\n• [font=default-bold]Distance[/font]: point sources fall off with distance; chunk sources reach 8 chunks — move further away.\n• [font=default-bold]Small buffers[/font]: don't dump uranium into one chest, damage scales linearly with amount.\n• [font=default-bold]Don't carry radioactive items[/font] — in your inventory they hit with no falloff.\n• Burn uranium in reactors instead of stockpiling it.
radiation-settings=\n[font=default-bold]Mod settings[/font] — Settings → Mod settings → Map tab (startup settings need a new save). Defaults in brackets:
radiation-sos=\n[color=255,80,80][font=default-bold]Radiation is killing you — what to do[/font][/color]\n1. [font=default-bold]Move away[/font] from uranium stockpiles and ore — chunk radiation needs ≥8 chunks (256 tiles).\n2. [font=default-bold]Drop radioactive items from your inventory[/font] (uranium, fuel cells) — they hit with no falloff.\n3. [font=default-bold]Put protection into the armor grid[/font] (absorption/reduction) — useless in the inventory.\n4. [font=default-bold]Chest of uranium glowing through walls?[/font] Empty it or temporarily disable chunk-range radiation in mod settings (Mod settings → Map, no restart).\n5. [font=default-bold]Run to the map center[/font] — no radiation inside the protection zone.\n6. Remember: walls stop point sources, not chunk stockpiles.
pollution-help=\n[color=180,200,80][font=default-bold]What toxic pollution is[/font][/color]\nStanding in a pollution cloud damages you. It depends on three things:\n• [font=default-bold]Pollution level[/font] where you stand.\n• [font=default-bold]Armor[/font] — its [font=default-bold]toxin[/font] resistance and absorption techs.\n• [font=default-bold]Time multiplier[/font] — the longer you stand, the harder it hits.\n\n[font=default-bold]The multiplier[/font] grows from 0 to [font=default-bold]×60 over 5 minutes[/font] in the cloud; damage = base × multiplier. Leave and it decays. So "a minute is fine, five minutes suddenly kills".\n\n[font=default-bold]Threshold[/font]: damage only applies if pollution is above the threshold (default 20) plus armor absorption.\n\n[font=default-bold]Armor spends durability, not HP[/font]: while you wear resistant armor, damage drains armor durability. Without armor — direct HP damage, up to death.\n\n[font=default-bold]On-screen warnings[/font]\n[img=virtual-signal/signal-yellow-gas-mask] high pollution (damage ≤ 20)\n[img=virtual-signal/signal-red-gas-mask] very high (damage > 20)\n[img=virtual-signal/signal-red-armor] armor worn out (< 25%)\n[img=virtual-signal/signal-yellow-more-toxin] accumulated toxins (residual damage after leaving)\n\n[font=default-bold]Example:[/font] [img=virtual-signal/signal-red-gas-mask] Very high pollution! · Pollution: 480 · Damage: 32 · Multiplier: 41
pollution-protect=\n[font=default-bold]How to protect against pollution[/font]\n• [img=item/respirator] [font=default-bold]Respirator / gas mask / armor with toxin resistance[/font] — wear it in the armor slot. Damage goes to durability, not HP.\n• [font=default-bold]Absorption techs[/font] (armor-absorb-1…N) — each raises armor absorption.\n• [font=default-bold]Auto-swap armor[/font]: when current armor wears out, the next one from inventory is equipped — keep spares.\n• [font=default-bold]Reduce pollution[/font]: less smoke, trees, air filtering.\n• [font=default-bold]Leave the cloud[/font] — multiplier and damage decay.\n• Don't linger in pollution — the multiplier builds up.
pollution-settings=\n[font=default-bold]Mod settings[/font] (startup settings need a new save). Defaults in brackets:
pollution-sos=\n[color=255,80,80][font=default-bold]Pollution is killing you — what to do[/font][/color]\n1. [font=default-bold]Leave the cloud immediately[/font] — damage and multiplier start decaying at once.\n2. [img=item/respirator] [font=default-bold]Put on armor or a respirator[/font] with toxin resistance — damage goes to durability, not HP.\n3. [font=default-bold]No armor?[/font] Run to clean air; without armor damage hits HP directly.\n4. [font=default-bold]Keep spare armor[/font] in your inventory and enable auto-equip.\n5. [font=default-bold]Research[/font] armor-absorb so armor absorbs more.\n6. Reduce pollution near your base: filters, trees, less smoke.

[zzz-rad-set]
chunk-range=radiation from chests through walls (default on). Turn it off and walls shield chests again.
chunk-radius=reach of chunk radiation, in chunks (def. 8; 4–48).
rad-radius=radius of point sources, in tiles (def. 12; 8–20).
protect-radius=safe zone around the map center (def. 50; 0–125).
base=global multiplier on all radiation before armor (def. 1.0).
mult=final damage multiplier (def. 1.0).
biters=biters and their corpses emit radiation (def. on).
perf=how many chunks are reprocessed per cycle; affects performance only, not damage (def. 6).
gui=on-screen radiation indicator when taking damage (def. on, per player).
menu=radiation animations in the main menu; cosmetic (def. on, startup).

[zzz-pol-set]
absorb-mult=how much armor's toxin resistance absorbs pollution; higher = armor holds more (def. 100; startup).
threshold=pollution below this (plus armor absorption) deals no damage (def. 20; startup).
auto-equip=when current armor wears out, equip the next one from inventory (def. on, per player).
respawn=give a respirator on respawn (def. off, per player).
