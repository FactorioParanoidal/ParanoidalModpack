[technology-description]
bet-charger=Schnellere Lader für Zug-Akkupacks.
bet-charger-tertiary=Akkupacklader, die nur überschüssige Energie nutzen und nie Energie aus Akkumulatoren beziehen.
bet-fuel=Verbesserte Zug-Akkupacks, die längere Laufzeit, schnellere Beschleunigung und höhere Maximalgeschwindigkeit ermöglichen.
bet-fuel-recycling=Recycle alte Zug-Akkupacks, um 90 % der darin enthaltenen Batterien zurückzuerhalten.
bet-tech=Elektrische Zuge, die mit wiederverwendbaren Akkupacks betrieben werden, die in stationären Ladestationen geladen werden können.


[mod-setting-name]
bet-battery-slots=Plätze für Zug-Akkupacks in Lokomotiven
bet-capacity-multiplier=Kapazitätsmultiplikator für Zug-Akkupacks
bet-charging-efficiency=Ladeeffizienz
bet-cheatsy-braking=Bremskraftmultiplikator
bet-cheatsy-locs=Aktiviere Schummeleinstellungen für Lokomotiven
bet-cheatsy-power=Lokomotiven-Beschleunigungsleistung
bet-cheatsy-speed=Maximalgeschwindigkeit
bet-cheatsy-wagons=Aktiviere Schummeleinstellungen für Waggons
bet-equipment-gridtype=Ausrüstungsraster für Lokomotiven
bet-recycling=Recycling von Zug-Akkupacks
bet-return-partial-batteries=Halbentladene Akkupacks zurückgeben

[mod-setting-description]
bet-battery-slots=Die Anzahl der Plätze für Akkupacks in Batterie-elektrischen Lokomotiven. Dieser Mod ist darauf ausgelegt, mit einem Akkupack pro Lokomotive gespielt zu werden. Diese Einstellung existiert als Workaround für einen Bug im LTN-Mod, der dazu führt, dass für Lokomotiven, die nur für einen Treibstoffgegenstand platz haben, nicht erfüllbare Bedingungen zum Nachtanken generiert werden. Wenn du LTN benutzt, stelle diese Einstellung auf 2 und stelle den Kapazitätsmultiplikator auf 0.5. [1 – 5]
bet-capacity-multiplier=Die Kapazitäten der vier Stufen von Zug-Akkupacks basieren auf Lokomotiven gefüllt mit Kohle, Festbrennstoff, Raketenbrennstoff oder Kernbrennstoff. Falls dir das nicht reicht oder du bereits zu Beginn des Spiels mehr Kapazität möchtest, kannst du diesen Multipikator erhöhen. Ladezeit und benötigte Batterien erhöhen sich entsprechend. [0.1 – 100]
bet-charging-efficiency=1.0 ist perfekte Ladeeffizienz. Nutze Werte kleiner 1 als Extra-Herausforderung oder nutze Werte größer 1 um zu schummeln und dir kostenlose Energie zu verschaffen. [0.1 – 1000]
bet-cheatsy-braking=Erhöhe (oder verringere) die Bremskraft von Waggons und Batterie-elektrischen Lokomotiven (falls aktiviert) durch Multiplikation mit diesem Faktor. 1 = keine Änderung. [0.1 – 100000]
bet-cheatsy-locs=Verändere Maximalgeschwindigkeit und Beschleunigungsleistung von Batterie-elektrischen Lokomotiven.
bet-cheatsy-power=Beschleunigungsleistung von Batterie-elektrischen Lokomotiven (falls aktiviert). [100 – 100000 kW]
bet-cheatsy-speed=Maximalgeschwindigkeit von Waggons und Batterie-elektrischen Lokomotiven (falls aktiviert). [10 – 7386.3 km/h]
bet-cheatsy-wagons=Erhöht die Maximalgeschwindigkeit von allen Güter- und Tank- und Artilleriewaggons, passend zu den Lokomotiven.
bet-equipment-gridtype=Wähle aus, welches Ausrüstungsraster aus anderen Mods für Batterie-elektrische Lokomotiven verwendet werden soll.
bet-recycling=Um die 90 % von realen Akkupacks lassen sich recyclen, also sollten auch hier Recycling von Zug-Akkupacks erforschbar sein. Kann Kompatibilitätsprobleme mit anderen Recycling-Mods verursachen.
bet-return-partial-batteries=Gib ein entladenes Akkupack zurück wenn eine Batterie-elektrische Lokomotive mit einem halbentladenen Akkupack darin abgebaut wird, anstatt es verschwinden zu lassen. Kann deaktiviert werden, um ein Bisschen kostbare UPS zu sparen.
