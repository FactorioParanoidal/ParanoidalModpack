# Debugging commands

## Moved to Pi-C_lib
#~ command-minime-show-active-events-help=[color=yellow]Verwendung: /__1__ \nAuf welche Ereignisse reagiert miniMAXIme gerade? Schreibt die Namen in den Chat und in die Logdatei.[/color]
#~ command-minime-is-event-active-help=[color=yellow]Verwendung: /__1__ [Name, ID]\nMit diesem Befehl findest du heraus, ob miniMAXIme gerade auf ein bestimmtes Ereignis ("event") reagiert. Das Ereignis kann entweder als Zeichenkette ohne Anführungszeichen (Name) oder als ganze Zahl (ID) angegeben werden.[/color]

command-minime-uninstall-help=[color=yellow]Usage: /__1__ (Erfordert Administratorrechte!)\nAlle Spieler im Charaktermodus wechseln zum Standardcharakter. Alle GUIs und alle Oberflächen, die miniMAXIme erzeugt hat, werden entfernt. Alle Ereignisse werden deaktiviert.[/color]


