[mod-name]
#~ minime=More accurate player size compared to vehicles
minime=miniMAXIme: Character scaler and selector

# Remove Chinese characters from some character mod names
jinx=Jinx Arcane
luotianyi=Tiga Tianyi
nailong-enemy=Nailong enemy
nailong=Nailong skin
tiga=Ultraman Tiga
wukong=Black Myth Wukong
yasuo=Yasuo


[mod-description]
#~ minime=The player stands like a giant near the vehicles. Now you can adjust the size of your character -- and if you use other mods that provide different characters, you can even change your appearance whenever you want with just the click of a button!
minime=Adjust the size of your character -- and change your appearance at any time if you've other mods that provide extra characters!

[mod-setting-name]
minime_scale-reach_resource_distance=Scale mining distance with character size
minime_scale-tool-attack-distance=Scale melee attack distance with character size
minime_character-size=Scaling factor for character size (in percent)
minime_character-selector=Enable character selector
minime_show-character-removal-buttons=Show buttons for god and editor mode
minime_small-character-collision-box=Minimize collision box of character
minime_followmode=Player position when returning to character mode
minime_close-gui-on-selection=Close GUI after character change
minime_debug_to_log=Write debugging output to log file
minime_debug_to_game=Print debugging output to game chat
minime_remove-armor-animations=Remove armor animations
minime_toggle-gui-with=Toggle GUI with
minime_icon-scheme=Icon scheme

[mod-setting-description]
#~ minime_scale-reach_resource_distance=Enable this if you want to scale your mining distance along with the size of your character.\n(Default: off)
#~ minime_scale-reach_resource_distance=Default: off
#~ minime_scale-tool-attack-distance=Enable this if you want to scale your melee attack distance along with the size of your character.\n(Default: off)
#~ minime_scale-tool-attack-distance=Default: off
minime_character-size=25: tiny\n100: Normal\n250: HUGE\n(Default: 70)
minime_character-selector=Change your appearance on the fly during the game, or toggle editor/god mode!\nPlease note: You will need at least one other mod that provides a new character skin. If the character you want isn't available for selection, ask the author of the mod providing it to add compatibility with "minime"!
minime_show-character-removal-buttons=You must have admin status to get the buttons for entering god or editor mode! In singleplayer games, you always are the admin; in multiplayer games, you're probably not.
minime_small-character-collision-box=Minimizing the collision box of characters allows you to squeeze through forests or move more easily between assemblers etc.
minime_followmode=When you exit editor or god mode, you will be reattached to the last character you've used. Here you can set whether you will be moved back to the location of your last character, or whether the character will be moved to your current location.
#~ minime_close-gui-on-selection=Enable this if the GUI should be closed after you have exchanged your character.\n(Default: off)
#~ minime_close-gui-on-selection=Default: off
minime_debug_to_log=If you experience a crash, please enable this setting, try to reproduce the crash, and post the log file!\nWarning: This will enable excessive logging, so you should turn logging off unless it's really needed.
minime_debug_to_game=Warning: This will print insane amounts of debugging output to the game chat! You should only enable this if you want to help debugging a problem.
minime_remove-armor-animations=If enabled, the armor animations will be removed from all characters. You can still use armors, but they will not change the characters' appearance.
#~ minime_toggle-gui-with=
minime_icon-scheme=Choose the icon scheme that will be used for the toggle button and shortcuts! This is just for optics and has no effect on how the mod is working.

[string-mod-setting]
#<setting-name>-<dropdown-item-name>=<translated dropdown item>
minime_followmode-player_follows_character=Player follows character
minime_followmode-character_follows_player=Character follows player

minime_toggle-gui-with-button=Button
minime_toggle-gui-with-shortcut=Shortcut

minime_icon-scheme-default=Default icons
minime_icon-scheme-plexpt_1=Black and white (by plexpt)
minime_icon-scheme-plexpt_2=Light color (by plexpt)


[string-mod-setting-description]
#<setting-name>-<dropdown-item-name>=<tooltip of dropdown item>
#~ minime_followmode-player_follows_character=On leaving editor or god mode, the player will be teleported to the position of the previous character.
#~ minime_followmode-character_follows_player=On leaving editor or god mode, the previous character will be moved to the current position of the player.\n(Warning: Combat bots will stop following the character when it's moved to another surface!)
minime_followmode-character_follows_player=Warning: Combat bots will stop following the character when it's moved to another surface!

