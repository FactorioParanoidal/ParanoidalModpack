[mod-name]
minime=mini皮肤选择器

[mod-description]
minime=调整你的皮肤大小，并且如果你使用了提供额外皮肤的mod，可以随时更改你的外观！

[mod-setting-name]
minime_scale-reach_resource_distance=随皮肤大小缩放采集距离
minime_scale-tool-attack-distance=随皮肤大小缩放近战攻击距离
minime_character-size=皮肤大小缩放系数（百分比）
minime_character-selector=启用皮肤选择器
minime_show-character-removal-buttons=显示上帝模式和编辑器模式按钮
minime_small-character-collision-box=最小化皮肤碰撞箱
minime_followmode=返回皮肤模式时的玩家位置
minime_close-gui-on-selection=选择皮肤后关闭GUI
minime_debug_to_log=将调试输出写入日志文件
minime_debug_to_game=在游戏聊天中打印调试输出
minime_remove-armor-animations=移除护甲动画
minime_toggle-gui-with=切换GUI的方式
minime_icon-scheme=图标方案

[mod-setting-description]
minime_scale-reach_resource_distance=启用后，你的采集距离将随皮肤大小一起缩放。\n（默认：关闭）
minime_scale-tool-attack-distance=启用后，你的近战攻击距离将随皮肤大小一起缩放。\n（默认：关闭）
minime_character-size=25：极小\n100：正常\n250：巨大\n（默认：70）
minime_character-selector=在游戏中随时更改你的外观，或切换编辑器/上帝模式！\n请注意：你至少需要另一个提供新皮肤的mod。如果想要选择的皮肤不可用，请联系提供该mod的作者，请求添加对“miniMAXIme”的兼容性！
minime_show-character-removal-buttons=你必须拥有管理员权限才能获得进入上帝或编辑器模式的按钮！在单人游戏游戏中，你始终是管理员；在多人游戏游戏中，你可能不是。
minime_small-character-collision-box=最小化皮肤的碰撞箱可以让你更容易穿过森林或在组装机之间移动。
minime_followmode=当你退出编辑器或上帝模式时，你将重新连接到你最后使用的皮肤。 你可以在这里设置你是被传送回最后一个皮肤的位置，还是将皮肤移动到你当前的位置。
minime_close-gui-on-selection=启用后，在你更换皮肤后，GUI将关闭。\n（默认：关闭）
minime_debug_to_log=如果遇到崩溃，请启用此设置，尝试重现崩溃，并发布日志文件！\n警告：这将启用过多的日志记录，因此除非确实需要，否则应关闭日志记录。
minime_debug_to_game=警告：这将在游戏聊天中打印大量的调试输出！ 仅当你想要帮助调试问题时才应启用此项。
minime_remove-armor-animations=如果启用，所有皮肤的护甲动画将被移除。你仍然可以使用护甲，但它们不会改变皮肤的外观。
minime_toggle-gui-with=选择用于切换皮肤选择器GUI的方式。
minime_icon-scheme=选择将用于切换按钮和快捷方式的图标方案！这只是外观上的调整，对mod的工作方式没有影响。

[string-mod-setting]
minime_followmode-player_follows_character=玩家跟随皮肤
minime_followmode-character_follows_player=皮肤跟随玩家

minime_toggle-gui-with-button=按钮
minime_toggle-gui-with-shortcut=快捷键

minime_icon-scheme-default=默认图标
minime_icon-scheme-plexpt_1=黑白 (plexpt 制作)
minime_icon-scheme-plexpt_2=浅色 (plexpt 制作)

[string-mod-setting-description]
minime_followmode-player_follows_character=离开编辑器或上帝模式时，玩家将被传送到之前皮肤的位置。
minime_followmode-character_follows_player=警告：当皮肤移动到另一个地表时，作战机器人将停止跟随皮肤！

[entity-name]
minime_character_dummy=虚拟皮肤
minime_generic_corpse=miniMAXIme：通用 __ENTITY__character-corpse__

[entity-description]
minime_generic_corpse=用于替换来自非活动mod的 __ENTITY__character-corpse__

[controls]
minime-toggle-selector-gui=切换皮肤选择器GUI

[minime-misc]
base-character=默认皮肤
bobclass-name=__1__（__2__）

