disabled-button-tooltip-plural=使用其中一个绿色按钮更改你的外观！

## Character removal buttons
# Used when there is only one character button
disabled-removal-button-tooltip=使用绿色按钮返回皮肤模式！
# Used when there are at least 2 skins to choose from
disabled-removal-button-tooltip-plural=使用其中一个绿色按钮返回皮肤模式！



