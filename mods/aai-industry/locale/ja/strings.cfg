[mod-setting-description]
;start-with-basic-logistics=開始時に基本的な物流学を研究完了とします。
;quick-start-science=開始時の自動化サイエンスパック数を指定します。不時着シーンまたはフリープレイシナリオが必要です。
;aai-fast-motor-crafting=鉄から短気筒エンジンを製造するためにかかる時間を、バニラにおける鉄の歯車を製造するためにかかる時間と等しくします。鉄の歯車:0.2秒、短気筒エンジン:0.3秒、銅線:0.2秒、小型モーター:0.4秒。
;aai-wide-drill=掘削範囲が広く高速でモジュールスロットを追加した、より大型の電動掘削機を追加します。
aai-burner-turbine-efficiency=燃料式タービン発電機の燃焼効率を変更します。
aai-fuel-processor=通常の燃料を万能かつより大きなエネルギー量を持つ加工燃料へと変換する燃料加工所を追加します。追加されるエネルギーの倍率は設定によります。無効化した場合はゲーム開始時において技術ツリーから隠されます。
aai-fuel-processor-efficiency=加工により追加されるエネルギー量の%です。高い数値にするほど、加工燃料を精製するために必要なエネルギー量が減ります。
aai-stone-path=石を使って設置可能な石畳を追加します。
wide-flashlight=キャラクター懐中電灯をワイド型に変更。
enhanced-nightvision=画面を脱色しないナイトビジョンLUTを使用し、いくつかのシャドウにわずかな緑のハイライトを追加します。
night-lut-set=夜の暗闇の演出の強さ。

