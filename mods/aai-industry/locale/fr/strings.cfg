[mod-setting-description]
start-with-basic-logistics=Commencer avec quelques technologies de base déjà recherchées, pour pouvoir fabriquer des tapis roulants et des machines à combustion immédiatement.
quick-start-science=Nombre de packs de science d'automatisation que le vaisseau écrasé contiendra.
aai-fast-motor-crafting=Permet la fabrication des __ITEM__motor__ à partir de plaques de fer dans le même temps que les engrenages en fer dans le jeu de base. __ITEM__iron-gear-wheel__ 0,2s, __ITEM__motor__ 0,3s, __ITEM__copper-cable__ 0,2s, __ITEM__electric-motor__ 0,4s.
aai-wide-drill=Ajoute une foreuse minière électrique plus grande avec une portée, une vitesse et des emplacements de module supplémentaires. Ce paramètre n'a aucun effet si Space Age est installé.
aai-burner-turbine-efficiency=Modifie l'efficacité du carburant de la turbine à combustion.
aai-fuel-processor=Ajoute une raffinerie de carburant pour convertir les carburants chimiques en carburant raffiné polyvalent permettant de gagner de l'énergie dans le processus (le gain d'énergie % est un paramètre différent). Si désactivé, la technologie est masquée au début du jeu.
aai-fuel-processor-efficiency=Pourcentage d'énergie supplémentaire obtenu grâce au processus de raffinage. Les valeurs plus élevées réduisent la consommation d'énergie du raffineur de carburant.
aai-stone-path=Ajoute des chemins en pierre brute qui peuvent être placés à partir de la pierre.
wide-flashlight=Remplace la lampe torche du personnage par une version à faisceau plus large.
enhanced-nightvision=Utilise pour la vision nocturne une LUT qui ne désature pas l'écran, ajoutant un léger surlignage vert à certaines ombres.
night-lut-set=Force de l'effet d'obscurité durant la nuit.

