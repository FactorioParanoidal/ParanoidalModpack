[mod-setting-description]
start-with-basic-logistics=Comienza con algunas tecnologías básicas preinvestigadas, para que puedas fabricar cintas transportadoras y máquinas de combustión de inmediato.
quick-start-science=El número de paquetes de ciencia de automatización que contendrá la nave accidentada.
aai-fuel-processor=Agrega un procesador de combustible para convertir los combustibles químicos en un combustible procesado versátil y ganar energía en el proceso (el porcentaje de ganancia de energía es una configuración diferente). Si está deshabilitada, la tecnología está oculta al comienzo del juego.
aai-fuel-processor-efficiency=El porcentaje de energía adicional que obtiene del proceso. Los valores más altos reducen el uso de energía del procesador de combustible.
aai-fast-motor-crafting=Fabrica __ITEM__motor__ a partir de una placa de hierro en el mismo tiempo que los engranajes de hierro en el juego base. __ITEM__iron-gear-wheel__ 0.2s, __ITEM__motor__ 0.3s, __ITEM__copper-cable__ 0.2s, __ITEM__electric-motor__ 0.4s.
aai-wide-drill=Agrega una perforadora eléctrica más grande, con mayor alcance, velocidad y ranuras para módulos adicionales. Esta configuración no tiene ningún efecto si Space Age está instalado.
aai-burner-turbine-efficiency=Cambia la eficiencia de combustible del generador de turbina a combustión.
aai-stone-path=Añade baldosas de piedra en bruto que se pueden colocar de piedra.
wide-flashlight=Reemplaza la linterna del personaje por una versión más amplia.
enhanced-nightvision=Utiliza una LUT de visión nocturna que no desatura la pantalla, agrega un ligero toque verde a algunas sombras.
night-lut-set=Fuerza del efecto de oscuridad nocturna.

