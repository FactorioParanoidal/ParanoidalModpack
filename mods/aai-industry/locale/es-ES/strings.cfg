[mod-setting-description]
start-with-basic-logistics=La tecnología básica de logística se investiga al comienzo del juego.
quick-start-science=La cantidad de paquetes de ciencia de automatización con los que comienza. (Requiere secuencia del accidente o escenario de juego libre)
aai-fuel-processor=Agrega un procesador de combustible para convertir los combustibles químicos en un combustible procesado versátil y ganar energía en el proceso (el porcentaje de ganancia de energía es una configuración diferente). Si está deshabilitada, la tecnología está oculta al comienzo del juego.
aai-fuel-processor-efficiency=El porcentaje de energía adicional que obtiene del proceso. Los valores más altos reducen el uso de energía del procesador de combustible.
aai-fast-motor-crafting=Hace que los motores se fabriquen a partir de placas de hierro en el mismo tiempo que los engranajes de hierro en vainilla. Engranaje de hierro 0,2 s, motor 0,3 s, cable de cobre 0,2 s, motor eléctrico 0,4 s.
aai-wide-drill=Agrega un taladro de minería eléctrico más grande con mayor alcance, velocidad y ranuras para módulos adicionales.
aai-burner-turbine-efficiency=Cambia la eficiencia de combustible del generador de turbina a vapor.
aai-stone-path=Añade baldosas de piedra en bruto que se pueden colocar de piedra.
wide-flashlight=Reemplaza la linterna del personaje por una versión más amplia.
enhanced-nightvision=Utiliza una LUT de visión nocturna que no desatura la pantalla, agrega un ligero toque verde a algunas sombras.
night-lut-set=Fuerza del efecto de oscuridad nocturna.

