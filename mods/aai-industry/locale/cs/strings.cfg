aai-fuel-processor=Přidává procesor paliv, který konvertuje chemická paliva na všestranná zpracovaná paliva se zvýšenou energetickou hodnotou (tato procentuální hodnota je nastavitelná). Pokud je tato možnost vypnutá, technologie bude na začátku hry schována.
