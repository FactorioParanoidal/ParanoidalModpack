[mod-setting-description]
;start-with-basic-logistics=Oyun temel lojistik teknolojisi araştırılmış olarak başlar.
;quick-start-science=Başladığınız makineleşme bilimi paketlerinin sayısı. (Kaza sekansını ya da serbest oynama senaryosunu gerektirir)
aai-fuel-processor=Kimyasal yakıtları çok yönlü işlenmiş yakıta dönüştürmek ve bu süreçte enerji kazanmak için bir yakıt işlemcisi ekler (enerji kazanımı %'si farklı bir ayardır). Devre dışı bırakılırsa, teknoloji oyunun başında gizlenir.
aai-fuel-processor-efficiency=İşlemden elde ettiğiniz bonus enerji yüzdesi. Daha yüksek değerler, yakıt işleyicisinin enerji kullanımını azaltır.
;aai-fast-motor-crafting=Motorların demir plakadan yapım süresini vanilyadaki demir dişli üretimiyle aynı yapar. Demir dişli 0.2s, Motor 0.3s, Bakır kablo 0.2s, Elektrik motoru 0.4s.
;aai-wide-drill=Artırılmış menzil, hız ve ekstra modül yuvalarına sahip daha büyük bir elektrikli maden sondajı ekler.
aai-burner-turbine-efficiency=Yakıtlı türbin jeneratörünün yakıt verimliliğini değiştirir.
aai-stone-path=Taştan yerleştirilebilen kaba taş yol zemini ekler.
wide-flashlight=Karakterin fenerinin ışığını genişletir.
enhanced-nightvision=Gece görüşü açıkken renkleri soldurmaz. Gölgelere hafif bir yeşil vurgu ekler.
night-lut-set=Gecenin karartma etkisinin gücü.

