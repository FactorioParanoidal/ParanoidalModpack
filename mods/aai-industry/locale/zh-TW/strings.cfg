[mod-setting-description]
start-with-basic-logistics=從一些預先研究的早期科技開始，這樣你就可以立即製作傳送帶和燃燒器。
quick-start-science=墜毀太空船將包含的自動化科技包數量。
aai-fast-motor-crafting=用鐵板製作__ITEM__motor__，時間與原版鐵齒輪相同。 __ITEM__iron-gear-wheel__ 0.2秒，__ITEM__motor__ 0.3秒，__ITEM__copper-cable__ 0.2秒，__ITEM__electric-motor__ 0.4秒。
aai-wide-drill=增加一個更大的電動採礦鑽機，其速度和額外的模組插槽均有所提升。如果安裝了“太空時代”，此設定將不起作用。
aai-burner-turbine-efficiency=更改燃燒器渦輪發電機的燃料效率。
aai-fuel-processor=添加燃料處理器，將化學燃料轉化為多功能加工燃料，並在此過程中獲取能量（能量增益百分比另行設定）。如果停用，該技術將在遊戲開始時隱藏。
aai-fuel-processor-efficiency=您從此過程中獲得的額外能量百分比。數值越高，燃料處理器的能耗就越低。
aai-stone-path=添加可從石頭上放置粗糙的石路磚塊。
wide-flashlight=將角色手電筒替換為更廣角的版本。
enhanced-nightvision=使用不會降低螢幕飽和度的夜視LUT，它會為一些陰影添加輕微的綠色高光。
night-lut-set=夜間黑暗效果的強度。

