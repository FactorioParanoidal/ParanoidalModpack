[technology-description]
basic-logistics=物品運輸的基礎知識。
basic-logistics-1=更快捷、更靈活的運輸方式。
basic-logistics-2=更快捷、更靈活的運輸方式。
burner-mechanics=可用於多種自供電設備的簡單引擎。
electricity=基礎：燃燒發電機、電動機和小型電線桿。
electronics=電子電路開啟了無限可能。
electric-lab=電力驅動的科學
basic-fluid-handling=管道流體的基礎知識。
steam-power=更有效率的蒸汽動力。
concrete-walls=更堅固的混凝土牆。
steel-walls=更堅固、抗損傷能力極強的牆。尖刺還會對攻擊者造成少量反擊。
engine=用於車輛和機器人的高效能、高功率引擎。
electric-engine=大型多相無刷馬達。
automobilism=快速運輸車輛。
fuel-processing=將任何化學燃料加工成成品燃料。獲得 __1__% 的能量值，並具有良好的車輛加速性能。
sand-processing=將原料粉碎、研磨並過濾成乾淨的沙子。
glass-processing=將沙子熔化成玻璃。
industrial-furnace=比電爐更大、更快，且擁有更多模組插槽。與大多數其他熔爐不同，需要選擇配方（使其能夠處理流體）。
area-mining-drill=一種更大的電動採礦鑽機，具有更大的射程、速度和額外的模組插槽。
medium-electric-pole=更具彈性的電力分配方式。

