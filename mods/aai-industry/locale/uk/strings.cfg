[mod-setting-description]
start-with-basic-logistics=Почати з кількома дослідженими технологіями зі змогою одразу створювати конвеєри та інструменти видобутку твердопаливних матеріалів.
quick-start-science=Кількість автоматизаційних дослідницьких пакетів наявних на розбитому кораблі.
aai-fast-motor-crafting=Створює __ITEM__motor__ із залізної пластини за такий самий час, як і в звичайній версії. __ITEM__iron-gear-wheel__ 0.2s, __ITEM__motor__ 0.3s, __ITEM__copper-cable__ 0.2s, __ITEM__electric-motor__ 0.4s.
aai-wide-drill=Додає більший електричний бур із розширеним радіусом дії, швидкістю та додатковими комірками для модулів. Це налаштування нічого не робитиме, якщо встановлено DLC Space Age.
aai-burner-turbine-efficiency=Змінює ефективність палива твердопаливного турбінного генератора.
aai-fuel-processor=Додає паливний процесор для перетворення хімічного палива в різне перероблене паливо. А також отримує енергію (% отримуваної енергії - це інше налаштування). Якщо налаштування вимкнене, то технологія буде прихована на початку гри.
aai-fuel-processor-efficiency=Відсоток додаткової енергії, отримуваної в процесі переробки. Вищі значення знижують використання енергії паливним процесором.
aai-stone-path=Додає клітинки кам'яного шляху.
wide-flashlight=Замінює звичайний ліхтарик на покращений.
enhanced-nightvision=Використовує LUT нічного бачення, який не затемнює екран. Додає трохи зеленого кольору для деяких тіней.
night-lut-set=Рівень затемнення під час ночі.

