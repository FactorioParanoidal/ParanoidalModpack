[mod-setting-description]
start-with-basic-logistics=开局有一些基础研究，能够更快的制造传送带和热能机器。
quick-start-science=坠机现场中的科技包数量。
aai-fast-motor-crafting=让__ITEM__motor__制造得和原版中得铁齿轮配方一样快。__ITEM__iron-gear-wheel__ 0.2s, __ITEM__motor__ 0.3s, __ITEM__copper-cable__ 0.2s, __ITEM__electric-motor__ 0.4s.
aai-wide-drill=添加一个大型电力采矿机，具有更大的作业范围和额外的插件插槽。 该设置在安装了太空时代时无效。
aai-burner-turbine-efficiency=改变燃气涡轮发电机的燃料效率。
aai-fuel-processor=增加一个燃料加工机，可以将化学燃料转化为通用的加工燃料，并在此过程中获得额外能量（能量获取 % 是另一个设置）。
aai-fuel-processor-efficiency=加工过程中获取的能量加成。数值越高，燃料加工机的能耗越低。
aai-stone-path=增加了粗糙的石路，可以用石矿来放置。
wide-flashlight=加宽玩家得手电筒照明范围。
enhanced-nightvision=使用不会使屏幕失去饱和度的夜视 LUT，它会在某些阴影中添加轻微的绿色高光。
night-lut-set=夜间的黑暗强度设置。

