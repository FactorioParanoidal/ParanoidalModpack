[mod-setting-description]
;start-with-basic-logistics=Công nghệ hậu cần cơ bản được nghiên cứu khi bắt đầu trò chơi.
;quick-start-science=Số gói khoa học tự động hóa mà bạn bắt đầu. (Yêu cầu trình tự sự cố hoặc kịch bản chơi tự do)
aai-fuel-processor=Thêm bộ xử lý nhiên liệu để chuyển đổi nhiên liệu hóa học thành nhiên liệu được xử lý linh hoạt và thu được năng lượng trong quá trình này (% năng lượng đạt được là một cái khác trong cài đặt). Nếu bị tắt, công nghệ sẽ bị ẩn khi bắt đầu trò chơi.
aai-fuel-processor-efficiency=Phần trăm năng lượng thưởng bạn nhận được từ quá trình. Giá trị cao hơn làm giảm mức sử dụng năng lượng của bộ xử lý nhiên liệu.
;aai-fast-motor-crafting=Chế tạo động cơ từ tấm sắt cùng thòi gian với bánh răng sắt trong vanilla. Bánh răng sắt 0,2s, Động cơ 0,3s, Cáp đồng 0,2s, Động cơ điện 0,4s.
;aai-wide-drill=Thêm một máy khoan khai thác điện lớn hơn với phạm vi tăng, tốc độ và một khe cắm mô-đun bổ sung.
aai-burner-turbine-efficiency=Thay đổi hiệu quả sử dụng nhiên liệu của máy phát điện tua-bin đốt.
aai-stone-path=Thêm gạch lát đường đá thô có thể được đặt từ đá.
wide-flashlight=Thay thế đèn pin nhân vật bằng một phiên bản rộng hơn.
enhanced-nightvision=Sử dụng bảng điều chỉnh tầm nhìn ban đêm không bão hòa màn hình, nó thêm một điểm sáng màu xanh lá cây nhẹ vào một số bóng tối.
night-lut-set=Độ mạnh của hiệu ứng bóng tối vào ban đêm.

