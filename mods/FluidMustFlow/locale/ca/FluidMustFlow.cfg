[tips-and-tricks-item-description]
fmf-auto-join=Els conductes petits contigus s'uniran automàticament i formaran conductes normals.\nEls conductes normals contigus s'uniran automàticament i formaran conductes llargs.\nAquesta característica es pot desactivar des de la configuració del mod. En aquest cas, hi haurà disponibles receptes dels conductes normals i dels conductes llargs.
fmf-endpoints=Degut a la seva mida més gran, les canonades normals no es poden connectar directament als conductes. Els fluids han d'entrar a la xarxa de conductes amb un conducte d'entrada i sortir-hi amb un conducte de sortida. S'hi poden connectar fins a sis canonades a cada extrem per a establir una circulació de fluids molt elevada.
fmf-introduction=Els conductes permeten transportar grans quantitats de fluids a llarga distància.
fmf-non-return-duct=El conducte de no retorn permet forçar que el fluid es mogui en una sola direcció. Els usos més habituals són els d'isolar l'àrea de producció i evitar desperdicis, prioritzar determinades branques o augmentar la pressió a llarga distància.

[tips-and-tricks-item-name]
