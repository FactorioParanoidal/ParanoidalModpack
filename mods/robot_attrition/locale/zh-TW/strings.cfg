[technology-description]
robot-attrition-explosion-safety=機器人妥善利用的機制，讓玩家在使用機器人時，能應用在於高附加價值的物品上，以免損毀機率過高不符合效益，是習慣於蒼蠅滿天飛的人，所不願意見到的機制平衡系統。\n如果物流蒼蠅超出 500 隻在四處亂飛，將會有撞機或損壞墜落發生，可從研究中降低損壞率，但過多蒼蠅在空中相撞的災難是無法避免的。

