[mod-setting-name]
aai-loaders-mode=Режим роботи
aai-loaders-lubricant-recipe=Додати рецепт мастила

[mod-setting-description]
aai-loaders-mode=Визначає, як AAI завантажувачі працюють у грі. Рекомендовано грати з мастилом; в іншому випадку, навіть в режимі з високими витратами, завантажувачі мають занадто багато переваг перед маніпуляторами.
aai-loaders-lubricant-recipe=Додавати чи ні простий, але неефективний рецепт, який дозволяє виробляти мастило безпосередньо з сирої нафти.\n\nЗа замовчуванням встановлено «Авто», що умовно вмикає цей рецепт, якщо розширена обробка нафти та рецепти важкої оливи до мастила не змінюються, ніж ваніль. Цей параметр нічого не робить, якщо режим роботи встановлено значення, відмінне від «Змащений».
aai-loaders-fit-assemblers=Збільшує розмір складальних автоматів на 8%, щоб графіка завантажувача підключалася належним чином.

