[string-mod-setting-description]
aai-loaders-mode-lubricated=Збалансовано за витратами рідини та логістикою.
aai-loaders-mode-expensive=Збалансована початковою вартістю. Без використання рідини.
aai-loaders-mode-graphics-only=Жодних змін в ігровому процесі. Надає лише графіку для інших модів.
aai-loaders-lubricant-recipe-auto=Додатковий рецепт перетворення сирої нафти в мастило ввімкнено, якщо розширені рецепти обробки олії та мастильних матеріалів не змінюються з ванілі.
aai-loaders-lubricant-recipe-enabled=Увімкнено додатковий рецепт перетворення сирої нафти на мастило.
aai-loaders-lubricant-recipe-disabled=Вимкнений додатковий рецепт перетворення сирої нафти на мастило.

