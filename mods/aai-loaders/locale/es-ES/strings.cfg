[mod-setting-name]
aai-loaders-mode=Modo de operación
aai-loaders-lubricant-recipe=Agregar receta de lubricante
aai-loaders-fit-assemblers=Adaptar máquinas de ensamblaje

[mod-setting-description]
aai-loaders-mode=Determina cómo funcionan los cargadores AAI en el juego. Lubricado es el modo recomendado; de lo contrario, incluso con costes elevados, los cargadores tienen demasiadas ventajas sobre los insertadores.
aai-loaders-lubricant-recipe=Si se agrega o no una receta simple pero ineficiente que permite la producción de lubricante directamente a partir de petróleo crudo.\n\nEl valor predeterminado es "Auto", que habilitará condicionalmente esta receta si no se modifican las recetas de procesamiento avanzado de petróleo y de conversión de petróleo pesado en lubricante del juego base. Esta configuración no hace nada si la configuración del modo de operación está establecida en algo que no sea "Lubricado".
aai-loaders-fit-assemblers=Aumenta un 8% el tamaño de las máquinas de ensamblaje para que los gráficos del cargador se conecten correctamente.

[string-mod-setting]
aai-loaders-mode-lubricated=Lubricado
aai-loaders-mode-expensive=Caro (sin uso de fluidos)
aai-loaders-mode-graphics-only=Solo gráficos
aai-loaders-lubricant-recipe-auto=Auto
aai-loaders-lubricant-recipe-enabled=Activado
aai-loaders-lubricant-recipe-disabled=Desactivado

[string-mod-setting-description]
aai-loaders-mode-lubricated=Equilibrado por coste de fluido y logística.
aai-loaders-mode-expensive=Equilibrado por el coste inicial. Sin uso de fluidos.
aai-loaders-mode-graphics-only=Sin cambios en el juego. Solo proporciona gráficos para otros mods.
aai-loaders-lubricant-recipe-auto=La receta extra de aceite crudo a lubricante está habilitada si las recetas avanzadas de procesamiento de aceite y lubricante no se modifican con respecto al juego base.
aai-loaders-lubricant-recipe-enabled=La receta extra de petróleo crudo a lubricante está habilitada.
aai-loaders-lubricant-recipe-disabled=La receta extra de petróleo crudo a lubricante está deshabilitada.

[recipe-name]
lubricant-from-crude-oil=Lubricante de petróleo crudo
