[mod-setting-description]
visible-pollutants-layer=Everything below this layer will be obscured by the pollution cloud. Effectively the "height" of the cloud.
visible-pollutants-opacity=The maximum thickness of the cloud. Higher values obscure more of the base.
visible-pollutants-see-through-max-opacity=Thickness limit for important areas, such as your position or interacted entities.
visible-pollutants-min=Pollution values lower than this will not be considered as pollution. May improve performance.
visible-pollutants-max=Pollution values higher than this will be considered as the maximum.
visible-pollutants-exponent=Values above 1 will decrease thickness at lower pollution levels. Values below 1 will increase thickness at lower pollution levels.
visible-pollutants-blend-in=Ratio of newer pollution values to blend into the existing cloud. Affects the smoothness of the changes.
visible-pollutants-ttl-minutes=Pollution that cannot be seen can be removed. Slightly affects performance.
visible-pollutants-update-limit=How many individual cloud elements can be updated in one tick. Directly affects performance.
visible-pollutants-update-chart-colors=Alter the colors of pollution on the map view to be closer to the visible pollution
visible-pollutants-add-to-planets=A comma-separated list of planets to add pollution to, e.g. fulgora,vulcanus
visible-pollutants-enable-solar-occlusion=Pollution will decrease the effectiveness of solar panels based on each panel's quality and pollution coverage. Promotes placing panels outside of polluted areas. Minor performance cost when changing related settings and placing significant amounts of panels.
visible-pollutants-solar-occlusion-reduction=Each panel's efficiency can be reduced by an amount up to this percentage based on the pollution above it. For example, a Common panel on Nauvis has 100% efficiency; if this value is 0.5, and it is 100% covered by pollution, then its efficiency will be reduced to 50%. A Legendary panel under the same conditions begins at 250%, so it would be reduced to 200%.
visible-pollutants-solar-occlusion-update-limit=How many chunks with solar panels can be updated in one tick. Directly affects performance.