[technology-description]
w93-scattergun-turrets=Ciężko opancerzona wieżyczka o małym zasięgu. Strzela nabojami loftkowymi. Wymaga niezablokowanej linii to celu.
w93-modular-turrets=System działek modułowych. Połącz moduł podstawy z modułem broni aby stworzyć działka do wymaganych ról.\n\nUniwersalny ciężki karabin maszynowy.
w93-modular-turrets2=Moduł podstawy wieży. Zamontowane uzbrojenie ma ulepszony zasięg. Wrażliwe a obrażenia.
w93-modular-turrets-gatling=Wysoce szybkostrzelne działko, zadające zaróno mnóstwo obrażeń jak i pochłaniające proporcjonalnie dużo amunicji.
w93-modular-turrets-lcannon=Działo zadające duże obrażenia do zwalczania opancerzonych przeciwników.
w93-modular-turrets-dcannon=Dwulufowe ulepszenie. Większy zasięg i szybkostrzelność.
w93-modular-turrets-hcannon=Działo dalekiego zasięgu. Podwojona siła ognia.
w93-modular-turrets-rocket=Broń wsparcia do zadania pierwszego uderzenia. Niska szybkostrzelność. Używać ostrożnie z rakietami atomowymi.
w93-modular-turrets-plaser=Szybkostrzelny laser impulsowy. Zwiększona wydajność w porównaniu z laserem ciągłym.
w93-modular-turrets-tlaser=Diałko laserowe dalekiego zasięgu, zapalające pojedyńczych przeciwników.
w93-modular-turrets-beam=Diałka wielofunkcyjne. Diałanie zależy od modułu podstawy w której zostało zamontowane.
w93-modular-turrets-radar=Wyspecjalizowane stacje radarowe do rozpoznania terenu.
w93-modular-turrets-damage=Zwiększone obrażenia gniazd i wieżyczek modułowych korzystających z amunicji.

[item-description]
w93-modular-turret-base=Gniazda modułowe są odporne na obrażenia, a zamontowane uzbrojenie skupia się na przeciwnikach na wprost od gniazda.\n\nPancerz - Silny\nPole ostrzału - Wąskie i głębokie\nZasięg - Normalny\nPrędkość obrotowa - Niska
w93-modular-turret2-base=Wieżyczki modułowe mają szerokie pole ostrzału i obracają się szybko.\n\nPancerz - Słaby\nPole ostrzału - Szerokie i płytkie\nZasięg - Wydłużony\nPrędkość obrotowa - Wysoka

w93-scattergun-turret=Wymaga niezablokowanej linii to celu.\n\nŁuk obszaru celowania: 120°\nPrędkość obrotowa: 162 °/s
