[technology-description]
w93-scattergun-turrets=Hochrobuster Nahkampfgeschützturm. Feuert Schrotpatronen ab. Benötigt eine freie Sichtlinie.
w93-modular-turrets=Flexibles Waffensystem für Geschütze. Kombiniere die gewünschte Waffe mit einer Basis, um ein Geschütz für spezifische Rollen zu erstellen.\n\nDas schwere MG ist eine vielseitige Allzweckwaffe. Sehr munitionseffizient.
w93-modular-turrets2=Geschützbasis für Feuerunterstützung aus der Hinterlinie. Montierte Waffen haben breitere Schusswinkel und schnellere Zielverfolgung. Anfälliger für Beschädigungen.
w93-modular-turrets-gatling=Hoch-DPS-Waffe, die sowohl Gegner als auch Munitionsvorräte zerschreddert. Am besten an wichtigen Engpässen eingesetzt.
w93-modular-turrets-lcannon=Auf Erstschlag fokussierte Waffe, um hochgepanzerte Ziele zu bekämpfen.
w93-modular-turrets-dcannon=Zwillingsgeschütz-Upgrade. Verbesserte Feuerrate und erhöhte Reichweite.
w93-modular-turrets-hcannon=Langstrecken-Kanonenwaffe, die die Reichweitenlücke zwischen Raketentürmen und früheren Kanonenmodellen schließt.
w93-modular-turrets-rocket=Langstrecken-Unterstützungswaffe für Erstschlagskapazität. Niedrige Feuerrate. Mit Vorsicht verwenden, wenn mit Nuklearwaffen geladen.
w93-modular-turrets-plaser=Pulslaser mit höherem Schadensausstoß im Vergleich zu kontinuierlichen Laserstrahlen.
w93-modular-turrets-tlaser=Hochfokussierte Laserwaffe, entworfen für das Ausschalten einzelner Ziele aus beträchtlicher Entfernung.
w93-modular-turrets-beam=Mehrzweck-Strahlengeschütze. Die Funktion wird durch die Geschützbasis bestimmt.
w93-modular-turrets-radar=Hochspezialisierte Radarstationen, um große Gebiete aufzudecken oder zu überwachen.
w93-modular-turrets-damage=Erhöht den Schaden von munitionsbasierten modularen Geschützen.

[item-description]
w93-modular-turret-base=Frontlinienmontierungen sind widerstandsfähig gegen Schaden, während montierte Waffen ihre Feuerkraft auf Ziele direkt vor dem Geschützturm konzentrieren.\n\nVerteidigung - Hoch\nWaffenwinkel - Eng\nWaffenreichweite - Standard\nWaffenfeuerfeld - Lang\nWaffennachführgeschwindigkeit - Niedrig
w93-modular-turret2-base=Hinterlinienmontierungen haben breite Feuerwinkel und verfolgen Ziele schneller.\n\nVerteidigung - Niedrig\nWaffenwinkel - Breit\nWaffenreichweite - Erweitert\nWaffenfeuerfeld - Kurz\nWaffennachführgeschwindigkeit - Hoch

w93-scattergun-turret=Benötigt freie Sichtlinie.\n\nFeuerwinkel: 120°\nNachführgeschwindigkeit: 162 °/s
w93-hmg-turret=Feuerwinkel: 120°\nNachführgeschwindigkeit: 86.4 °/s
w93-hmg-turret2=Feuerwinkel: 180°\nNachführgeschwindigkeit: 172.8 °/s
w93-gatling-turret=Feuerwinkel: 45°\nNachführgeschwindigkeit: 86.4 °/s
w93-gatling-turret2=Feuerwinkel: 90°\nNachführgeschwindigkeit: 172.8 °/s
w93-lcannon-turret=Feuerwinkel: 45°\nNachführgeschwindigkeit: 43.2 °/s
w93-lcannon-turret2=Feuerwinkel: 90°\nNachführgeschwindigkeit: 86.4 °/s
w93-dcannon-turret=Feuerwinkel: 30°\nNachführgeschwindigkeit: 32.4 °/s
w93-dcannon-turret2=Feuerwinkel: 60°\nNachführgeschwindigkeit: 64.8 °/s
w93-hcannon-turret=Feuerwinkel: 20°\nNachführgeschwindigkeit: 10.8 °/s
w93-hcannon-turret2=Feuerwinkel: 40°\nNachführgeschwindigkeit: 21.6 °/s
w93-rocket-turret=Feuerwinkel: 30°\nNachführgeschwindigkeit: 32.4 °/s
w93-rocket-turret2=Feuerwinkel: 60°\nNachführgeschwindigkeit: 64.8 °/s
w93-plaser-turret=Feuerwinkel: 60°\nNachführgeschwindigkeit: 43.2 °/s
w93-plaser-turret2=Feuerwinkel: 120°\nNachführgeschwindigkeit: 64.8 °/s
w93-tlaser-turret=Feuerwinkel: 30°\nNachführgeschwindigkeit: 86.4 °/s
w93-tlaser-turret2=Feuerwinkel: 60°\nNachführgeschwindigkeit: 64.8 °/s
w93-beam-turret=Feuert einen durchdringenden Strahl. Benötigt freie Sichtlinie.\nFeuerwinkel: 70°\nNachführgeschwindigkeit: 21.6 °/s
w93-beam-turret2=Feuert einen kontinuierlichen elektrischen Strahl, der Ziele verlangsamt.\nFeuerwinkel: 120°\nNachführgeschwindigkeit: 43.2 °/s

