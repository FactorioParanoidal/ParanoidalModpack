[technology-description]
w93-scattergun-turrets=高耐久低射程的炮塔, 发射霰弹弹药. 需要射程内无遮挡.
w93-modular-turrets=模块化的通用武器系统. 安装所需的武器组件以适应不同场景.\n 重型机枪是高效的多用途武器. 用子弹淹没你的敌人吧!
w93-modular-turrets2=用于后方支援的通用炮塔基座. 安装的武器组件拥有更广的射角和旋转速度, 但是其耐久相对较低.
w93-modular-turrets-gatling=拥有高DPS输出以粉碎敌人. 最好布置在关键位置.
w93-modular-turrets-lcannon=用于解决高抗性敌人的实验性炮塔.
w93-modular-turrets-dcannon=升级双联装! 射速和射程都得到了提升.
w93-modular-turrets-hcannon=用于补充导弹塔与轻型炮塔之间火力空隙的远程炮塔.
w93-modular-turrets-rocket=拥有远程打击能力的支援型炮塔. 射速较低. 发射原子弹需谨慎!
w93-modular-turrets-plaser=脉冲激光炮相较常规激光炮塔有更高的的输出.
w93-modular-turrets-tlaser=高能激光炮, 主要用于狙杀远距离的敌人.
w93-modular-turrets-beam=多用途激光炮塔. 其功能根据基座不同而有所区别.
w93-modular-turrets-radar=专用于监测大范围区域的雷达.
w93-modular-turrets-damage=增加基于弹药的模块化炮塔的伤害.

[item-description]
w93-modular-turret-base=前线型炮塔基座具有伤害抗性, 其搭载的武器主要攻击正前方的目标.\n\n防御性能 - 高\n射角- 较窄\n射程 - 中等\n攻击范围 - 远\n旋转速度 - 较慢
w93-modular-turret2-base=支援型炮塔基座射角较大, 能快速锁定目标.\n\n防御性能 - 低\n射角- 宽\n射程 - 较大\n攻击范围 - 较近\n旋转速度 - 快

w93-scattergun-turret=需要射程内无遮挡.\n\n射角: 120°\n炮塔转速: 162 °/s
