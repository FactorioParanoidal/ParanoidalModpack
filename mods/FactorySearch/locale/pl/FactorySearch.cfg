[mod-setting-description]
fs-non-blocking-search=Wyszukiwanie trwa znacznie dłużej, ale nie zatrzymuje gry.
fs-chunks-per-tick=Działa tylko przy włączonym wyszukiwaniu w tle.\nZmniejszenie spowolni wyszukiwanie, ale poprawi wydajność gry.
fs-initial-zoom=Poziom przybliżenia przy prezentowaniu wyników. Wyższa wartość oznacza większe przybliżenie.\nZazwyczaj między [font=default-bold]0.3[/font] a [font=default-bold]3[/font].
fs-clear-highlights-with-gui=Usuwa podświetlenia i strzałki po zamknięciu interfejsu.
fs-highlight-duration=Ilość sekund, przez które widoczne jest podświetlenie i strzałki.\n[font=default-bold]0[/font] oznacza nieskończony czas.

[string-mod-setting]
fs-non-blocking-search-on=Włączone
fs-non-blocking-search-multiplayer=Tylko w trybie wieloosobowym
fs-non-blocking-search-off=Wyłączone

