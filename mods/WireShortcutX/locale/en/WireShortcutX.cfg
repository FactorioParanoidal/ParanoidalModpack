[shortcut]
wsx-make-wire=Make/cycle wires

[mod-setting-name]
wsx-number-of-shortcuts=Number of shortcuts

[mod-setting-description]
wsx-number-of-shortcuts=This setting only affects which shortcut buttons are visible ingame and their icons. All four keybindings are always available and can be configured in [font=default-bold]Settings > Controls[/font].

[string-mod-setting]
wsx-number-of-shortcuts-one=[font=default-semibold]One[/font]     [item=red-wire][item=green-wire][item=copper-cable]
wsx-number-of-shortcuts-two=[font=default-semibold]Two[/font]     [item=red-wire][item=green-wire] / [item=copper-cable]
wsx-number-of-shortcuts-three=[font=default-semibold]Three[/font]  [item=red-wire] / [item=green-wire] / [item=copper-cable]
