[mod-name]
Picks-Inserter=Picklocks Inserter block detacher

[mod-description]
Picks-Inserter=This mod prevents a inserter from keeping items in its hand if the inserter cannot drop items at the target. \n- Items are placed back where they were picked up. \n- If this is not possible and the option is activated, the items are destroyed.\n\n! Once items have been destroyed, they cannot be restored. !

[mod-setting-name]
PI_temp_unlock=General: Unblock locked chest slots
PI_clear_inserter=General: Delete items
PI_target_selection=Selection: Enable inserter cleanup planner
PI_keep_selected=Selection: Clean up permanently
PI_set_mark=Selection: Mark selected inserters
PI_clear_max=Selection:  Maximum number per tick
PI_target_train_stop=Train: Clean up inserters at train stops
PI_lines_to_check=Train: Area to clean up in width
PI_extend_length=Train: Extend area to clean up in length

[mod-setting-description]
PI_temp_unlock=If a chest has blocked slots, the blocking is removed for the duration of the return. \nThis can be helpful so that the affected inserters can also put the items back if the chests are normally completely full.
PI_clear_inserter=If items cannot be put back by the inserter, these items are destroyed and the inserter is free again.
PI_target_selection=Inserters can be selected for cleaning.
PI_keep_selected=Selected inserters remain selected until they are deselected and are permanently cleaned up.
PI_set_mark=Selected inserters will be marked
PI_clear_max=Maximum number of inserters to be cleaned up per tick. \nminimum value: 1 \nmaximum value: 30
PI_target_train_stop=Will do the cleaning up for inserters around cargo wagons when the train leaves a train stop. Therefore, the train has to enter and leave the train stop in "automatic" mode (do not change to "manual" mode in between). \nThe check will be done for the areas on both sides of every cargo wagon connected to the train. Cargo wagons which are not aligned horizontally or vertically will be skipped even if loading / unloading is possible!
PI_lines_to_check=Defines how many lines of tiles should be scanned vertically to the cargo wagon for inserters to be cleaned.
PI_extend_length=Increases the area to be cleaned horizontally beyond the length of a cargo wagon (i.e. increases the area parallel to the cargo wagon).

[item-name]
PI_inserter_selector=Inserter cleanup planner

[item-description]
PI_inserter_selector=Planner for the automatic cleanup of inserters: \n Inserter within the selected range are cleaned up fully automatically. \nWhen selecting with the Shift key pressed, the automatic cleanup for inserters within the selection is deactivated. \nThe inserters continue to work normally (i.e. they can pick up and place objects as normal).

[controls]
PI_inserter_selector_ui=Activate inserter cleanup planner
pi-orphan-mark-del-key=Delete orphan marks

[controls-description]
PI_inserter_selector_ui=Activates the planner for the automatic cleanup of inserters: \nInserters within the selected range are cleaned up fully automatically. \nWhen selecting with the Shift key pressed, the automatic cleanup for inserters within the selection is deactivated. \nThe inserters continue to work normally (i.e. they can pick up and place objects as normal).
pi-orphan-mark-del-key=Deletes orphaned markers whose inserters have been destroyed.\n\nThe markers are usually deleted automatically with the inserter. If this does not work, the orphaned markers can be removed from the game.

[PicksInserter]
PI_inserter_selector_ui_sc=Inserter cleanup planner (__CONTROL__PI_inserter_selector_ui__)

