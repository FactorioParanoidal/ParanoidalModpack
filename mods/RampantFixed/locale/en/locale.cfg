[item-description]
powerup-Combat5min-Capsule-rampantFixed=Rarely obtained by destroying Rampant nests directly by the player\nChance is higher when destroyed at close range (90<70<40<20<15)[color=green]\nWhen used, gives the player a boost for 5 minutes: \n -infinite ammo (if more than 1) \n -destroying biters with one shot (physical and explosive damage only) \n - increased damage to biters with 4000+ health instead of instant kill[/color][color=red]\nIf there are ammo in the main inventory, they are spent[/color]
regenerationCrystal-rampantFixed=Rarely obtained by destroying Rampant nests directly by the player from a distance of 20 or less\nCan work as a small radar, does not require power[color=green]\nOnce every 5 seconds, applies regeneration to nearby players for 1 minute\nInvulnerable after first attempt to apply a buff[/color][color=red]\n1% chance of destruction when applying a buff, regardless of the number of targets[/color]
biterSupressor1-rampant=Designed to reduce the threat to temporarily leaved planets[color=green]\nReduces the frequency of attacks from the AI Rampant by 3 times. Prevents mass attacks in case of a defense breakthrough[/color]\nDoes not affect demolishers, pollution attacks, or nest destruction response[color=red]\nThe positive effect is not applied when players are physically present on the planet.\nWhen placing 2 or more, the positive effect does not stack[/color]
biterSupressor2-rampant=Designed to reduce the threat to temporarily leaved planets\nContains the functionality of the previous version, plus:[color=green]\nIncreases the interval between demolishers attacks by 1.5 times. Also works on food\nReduces the maximum size of the attacking squad controlled by the AI Rampant by half[/color]
biterSupressor3-rampant=Designed to reduce the threat to temporarily leaved planets\nContains the functionality of the previous version, plus:[color=green]\nWith 100% continuous power supply, evolution on the planet will not grow[/color]
demolisher-food-rocket-rampant=Launches at the attacking demolisher. It won't return for at least 2 hours. Large demolishers can eat more
unstable-feeding-reactor-rampant=Explodes when planted, releasing multiple missiles. Destroyers will not come to you for 8 hours. VERY DANGEROUS

