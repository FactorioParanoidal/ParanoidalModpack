rampantFixed--K2_SE_CMO_incompatibilityWarning=A combination of mods K2+SE + combat-mechanics-overhaul was found.  In this combination, the mod settings <combat-mechanics-overhaul>: Spitter/worm spit blockable "[font=heading-1][color=red] incorrectly converts the attacks of [/color][/font] fire and infernal factions. If they are enabled, then enable an alternative attack (Rampant Fixed setting: Projectiles: replace steam attacks with blockable projectiles)
rampantFixed--undergroundAttackWarning=Warning: __1__: biters learned underground attacks!  A hard surface (movement speed 150+) will delay the digging process for a minute,
