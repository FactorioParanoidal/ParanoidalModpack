rampantFixed--demolisherFeeded_noHunger=__1__: You have fed the demolisher and he will come to you only in __2__ minutes. He does not want to eat anymore. The food will soon take effect
rampantFixed--demolisherFeared=__1__: You scared the demolishers and they will come to you only in __2__ minutes

