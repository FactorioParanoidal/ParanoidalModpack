[entity-description]
regenerationCrystal-rampantFixed=[color=green]Can be mined\nGrants regeneration to friendly players if turned on\nThe effect is increased by 3 times at 50+ and 70+ evolution[/color][color=red]\nMay break when applying a buff[/color]
lootStone_Combat5-rampantFixed=Lootstone\nMine or destroy it
biterSupressor1-rampant=Designed to reduce the threat to temporarily leaved planets[color=green]\nReduces the frequency of attacks from the AI Rampant by 3 times. Prevents mass attacks in case of a defense breakthrough[/color]\nDoes not affect demolishers, pollution attacks, or nest destruction response[color=red]\nThe positive effect is not applied when players are physically present on the planet.\nWhen placing 2 or more, the positive effect does not stack[/color]
biterSupressor2-rampant=Designed to reduce the threat to temporarily leaved planets\nContains the functionality of the previous version, plus:[color=green]\nIncreases the interval between demolishers attacks by 1.5 times. Also works on food\nReduces the maximum size of the attacking squad controlled by the AI Rampant by half[/color]
biterSupressor3-rampant=Designed to reduce the threat to temporarily leaved planets\nContains the functionality of the previous version, plus:[color=green]\nWith 100% continuous power supply, evolution on the planet will not grow[/color]

