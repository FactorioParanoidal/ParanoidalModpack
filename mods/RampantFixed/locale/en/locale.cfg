rampantFixed--EnemySettings1_1_9=Rampant Fixed: since version 1.1.9, a mixed settlement of rampant and other enemies is available (see startup settings). Only in the new game.
rampantFixed--EnemySettings1_1_10=Rampant Fixed: since version 1.1.10 it is possible to replace the nests of new enemies with standard ones. This can be useful if you want to continue the game without new enemies or remove the mod without losing nests (player settings- "Show dialog to disable new enemies"). Singleplayer game or "admin" players only
rampantFixed--enableShootingAlerts=Rampant Fixed: It is recommended to find a way to enable notifications for turrets firing. Without this, you risk missing attacks 
rampantFixed--disableNewEnemies_text=Nests are replaced on all planets. They will not be returned
