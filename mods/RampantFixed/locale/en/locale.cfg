rampantFixed--JuggernautAlert=Rampant Fixed: ATTENTION! AT 82% EVOLUTION A JUGGERNAUTS FACTION IS POSSIBLE! They are extremely resistant to fire and physical damage.

rampantFixed--demolisherNote1=[color=red]__1__:Demolisher attack. Once attack and leave alive, he will come again and again.[/color] By destroying him, you delay the moment of attack of another demolisher.
rampantFixed--demolisherNote2=When attacks begin, in 20% of cases a complete copy of the existing demolisher attacks. In other cases, a mutation occurs. Only Space Age demolisher mutate.
rampantFixed--demolisherNote3=With __1__% evolution, mutation into a medium demolisher is possible. With __2__% - into a large one. If you can't kill it - feed it.
rampantFixed--demolisherNotFeeded=__1__: The demolisher is full and does not react to food.
