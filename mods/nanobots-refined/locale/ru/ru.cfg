[item-description]
gun-nano-emitter=Активирует запрограммированных нано-ботов в зависимости от типа боеприпасов.
ammo-nano-levelers=Уничтожает все природные объекты. Предметы не возвращаются.
ammo-nano-scrappers=Уничтожает объекты, помеченные на демонтаж в радиусе. Предметы не возвращаются.
ammo-nano-deconstructors=Разбирает объекты, помеченные на демонтаж в радиусе. Предметы возвращаются игроку.
ammo-nano-constructors=Восстанавливает призраки объектов, используя предметы из инвентаря. Также ремонтирует поврежденные объекты.
equipment-bot-chip-items=Автоматически помечает предметы на земле для сбора, если в сети есть доступные роботы. Не срабатывает, если поблизости враги.
equipment-bot-chip-trees=Автоматически помечает деревья в радиусе для вырубки, если в сети есть доступные роботы. Не срабатывает, если поблизости враги.
equipment-bot-chip-launcher=Автоматически выпускает боевые юниты из инвентаря при появлении врагов в радиусе. Требуется персональный робопорт.
equipment-bot-chip-feeder=Аварийный питатель. Автоматически использует лечебные предметы при низком здоровье. Перезарядка 2 минуты. Требуется персональный робопорт.
equipment-bot-chip-nanointerface=Позволяет нано-ботам работать внутри логистических ячеек. Достаточно одного чипа.

