[technology-description]
nanobots=Освободи мощных мини-ботов, чтобы быстрее развиваться.
nanobots-cliff=Хватит наноботов и взрывчатки — и утёс исчезнет.
nano-range=Новые знания позволяют немного увеличить радиус действия наноботов.
nano-speed=Улучшенные алгоритмы ускоряют работу наноботов.
roboport-interface=Интерфейс взаимодействия с логистической сетью.

[modifier-description]
nano-ammo-damage-bonus=Увеличивает радиус действия наноботов на 2 клетки.
nano-ammo-shooting-speed-bonus=Увеличивает скорость использования наноботов на 25%.
nano-explosives=Позволяет наноботам использовать взрывчатку для разрушения утёсов.

