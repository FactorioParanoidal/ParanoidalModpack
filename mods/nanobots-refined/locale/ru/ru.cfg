[entity-description]
roboport-interface-main=Связывается с ближайшей логистической сетью для назначения задач.
roboport-interface-cc=Устанавливает сигналы для выдачи особых задач неактивным ботам. Пример: сигнал древесины — вырубка деревьев, сигнал плитки — строительство плитки. См. документацию.
roboport-interface-scanner=Сканирует сеть и сообщает о доступных задачах.

