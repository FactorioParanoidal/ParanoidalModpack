[equipment-description]
equipment-bot-chip-items=Автоматически помечает предметы на земле для сбора. Требует наличия сети с доступными роботами. Не работает при наличии врагов.
equipment-bot-chip-trees=Автоматически помечает деревья для демонтажа в радиусе. Требует логистическую сеть с роботами. Не работает при угрозе.
equipment-bot-chip-launcher=Автоматически запускает боевых юнитов из инвентаря при появлении врагов. Требуется активный персональный робопорт.
equipment-bot-chip-feeder=Аварийный питатель. Автоматически использует предметы лечения при низком здоровье. Перезарядка 30 секунд. Если предметов нет — восстанавливает 10 ХП. Требует персональный робопорт.
equipment-bot-chip-nanointerface=Позволяет нано-ботам работать внутри логистических ячеек. Один чип достаточно. Работает даже без персонального робопорта или ботов.

