[virtual-signal-name]
nano-signal-chop-trees=Интерфейс робопорта\nВырубка деревьев\nУстановите отрицательное значение,\nчтобы вырубать деревья, пока в сети не окажется заданное количество древесины.
nano-signal-item-on-ground=Интерфейс робопорта\nСбор предметов с земли
nano-signal-closest-roboport=Интерфейс робопорта\nПрименять сигналы только к ближайшему\nробопорту в радиусе
nano-signal-deconstruct-finished-miners=Интерфейс робопорта\nДемонтаж завершённых буров
nano-signal-ladfill-the-world=Интерфейс робопорта\nЗасыпка воды землёй\nУстановите отрицательное значение,\nчтобы сохранить указанное количество земли в сети
nano-signal-catch-fish=Интерфейс робопорта\nПоиск всей рыбы\nРыба — это хорошо. Рыба — это мощь.
nano-signal-build-tiles=Интерфейс робопорта\nПостройка плитки\nДобавьте сигнал плитки следующим сигналом,\nчтобы строить нужную плитку.\nОтрицательное значение — только при наличии\nдостаточного количества в сети.
nano-signal-smarter-charging=Интерфейс робопорта\nУмная подзарядка ботов\nПериодически заставляет роботов\nпереподключаться к другим станциям.
nano-signal-upgrade-modules=Интерфейс робопорта\nУлучшение модулей\nЗаменяет модули более низкого уровня\nна более высокие.
nano-signal-refill-turrets=Интерфейс робопорта\nПополнение турелей\nПоложительное значение — полная загрузка турелей боеприпасами.

