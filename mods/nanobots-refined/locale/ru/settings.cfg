[mod-setting-description]
nanobots-auto=Наноботы развёртываются автоматически, без выстрела. Медленнее ручного режима.
nanobots-network-limits=Запрещает авто‑наноботам работать внутри логистических сетей. Не влияет на ручной режим.
nanobots-nano-poll-rate=Как часто (в тиках, на игрока) проверять экипировку и авто‑нанобот‑приказы. Игроки распределяются для снижения нагрузки.
nanobots-nano-queue-per-cycle=Количество объектов, ставимых в очередь за один цикл.
nanobots-cell-queue-rate=Тики между проверками робопортов, поставленных интерфейсом.
nanobots-free-bots-per=Процент свободных строительных ботов, необходимый для постановки задач интерфейсом.
nanobots-equipment-auto=Экипировка наноботов в броне автоматическая. Отключение потребует ручного использования. (Пока недоступно)
nanobots-nano-build-tiles=Конструктор‑наноботы могут строить плиточные призраки.
nanobots-afk-time=Время (в секундах) бездействия до отключения наноботов. 0 — никогда не отключать.
nanobots-nano-fullfill-requests=Наноботы попытаются выполнить прокси‑запросы.
nanobots-active-emitter-mode=В авто‑режиме нано‑излучатель действует только при его выборе в качестве оружия. Не влияет на ручной режим.
nanobots-levelers-only-targeted-cliffs=Уровни уничтожают только утёсы, помеченные на демонтаж. При false — уничтожают все.
nanobots-levelers-destroy-targeted-nature=Позволяет уничтожать помеченные деревья и камни (при этом предметы будут потеряны). При false — игнорирует помеченные объекты.
nanobots-levelers-place-landfill=Позволяет размещать засыпку на всех пригодных плитках.
nanobots-recipe-version=Выбор версии рецептов нано‑боеприпасов.
nanobots-disable-nano-explosives=Скрывает технологию «Нано‑взрывчатка». Если уже изучена — её эффект остаётся.
nanobots-disable-nano-debug=Отключает отладочные сообщения, показываемые при попытке игрока построить что‑либо с помощью наноботов. Полезно для снижения спама в многопользовательских играх.

[string-mod-setting]
nanobots-recipe-version-legacy=Наследственная
nanobots-recipe-version-standard=Стандартная
nanobots-recipe-version-basic=Базовая

[string-mod-setting-description]
nanobots-recipe-version-legacy=Оригинальный рецепт, в основном для уже существующих фабрик.
nanobots-recipe-version-standard=Новый рецепт с более сбалансированными компонентами. Дороже, но даёт больше.
nanobots-recipe-version-basic=Упрощённый вариант нового рецепта, ближе по затратам к оригиналу.
