[mod-setting-description]
nanobots-auto=Nanobots automatically deploy rather than needing to be shot. Slower than Manual Mode, and requires a Nano Interface installed in armor to work in construction bot networks.
nanobots-network-limits=Prevent use of Auto Mode nanobots inside robot networks. No effect in Manual Mode.
nanobots-nano-poll-rate=How often in ticks, per player, to search for equipment or Auto Mode nanobot orders. Players are spaced out to reduce processing strain.
nanobots-nano-queue-per-cycle=Number of entities queued per cycle.
nanobots-cell-queue-rate=Rate in ticks between checking roboports queued by the roboport interface.
nanobots-free-bots-per=Percentage of available construction bots needed for roboport interface to queue actions.
nanobots-equipment-auto=Nano Power armor equipment is automatic, Disabling will require using items to active. (Not Available Yet)
nanobots-nano-build-tiles=Constructor nanobots can build tile ghosts.
nanobots-afk-time=How long in seconds to be afk before nanbots shut down. 0 to never shutdown.
nanobots-nano-fullfill-requests=Nanobots will attempt to fullfill request proxies.
nanobots-active-emitter-mode=Auto Mode nanobots will only deploy when the Nano Emitter is the selected gun. No effect in Manual Mode.
nanobots-levelers-only-targeted-cliffs=Limits levelers to destroying only cliffs that are marked for deconstruction. If false, levelers destroy all cliffs.
nanobots-levelers-destroy-targeted-nature=Allows levelers to destroy trees and rocks marked for deconstruction (thereby destroying their items). If false, marked features will be ignored.
nanobots-levelers-place-landfill=Allows levelers to place landfill (on all landfillable tiles).
nanobots-recipe-version=Which version of the nanobot ammo recipes to use.
nanobots-disable-nano-explosives=Hides the "Nano Explosives" technology which allows using any sort of explosives to destroy cliffs. If already researched, does not prevent its effect.
nanobots-mute-launcher=Stops the nanobot launcher playing the "All done" and "Out of supplies" sounds.

[string-mod-setting]
nanobots-recipe-version-legacy=Legacy
nanobots-recipe-version-standard=Standard
nanobots-recipe-version-basic=Basic

[string-mod-setting-description]
nanobots-recipe-version-legacy=The original recipe, mostly kept for factories from previous versions.
nanobots-recipe-version-standard=A new recipe, with more fitting inputs. A bit more expensive, but produces more per recipe.
nanobots-recipe-version-basic=A trimmed-down version of the new recipe, more in line with the original recipe's cost.
