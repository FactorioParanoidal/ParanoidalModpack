[mod-setting-name]
unpollock-decorative-rate=Decorative rate
unpollock-fake-rocks=Fake rocks
unpollock-avoid-resources=Avoid resource patches

[mod-setting-description]
unpollock-decorative-rate=Decorative frequency, as a multiplier to vanilla. Minimum 0, maximum 1. Default 0.4.
unpollock-fake-rocks=Decorative (non-physical) rocks to remove from map generation.\n\nOrder string is used to group rocks together in the editor and is recommended, but may not catch rocks from mods.\n\nPlanet control affects only Nauvis-type rocks as of Factorio 2.0 and may affect other decoratives intended to appear near rocks.

[string-mod-setting]
unpollock-fake-rocks-keep=Keep fake rocks
unpollock-fake-rocks-by-order=Order string contains "[rock]"
unpollock-fake-rocks-by-control=Uses "rocks" planet control
unpollock-fake-rocks-by-name=Name contains "rock" or "rocks"
